\* TLC configuration for SupplyCounterRead.tla (FB70).
\* Model: Values = {0, 1} (per-counter committed values at the head
\* snapshot), NoVal = 9 (the not-accepted sentinel, outside Values).
\*
\* Init enumerates the full committed-head-snapshot x daemon-strategy
\* universe: chain_head in [1..5 -> {0,1}] (32 tables) x strategy in
\* [1..5 -> {HONEST, LIE, STALE, FORGED}] (1024 strategies) = 32,768
\* initial states; each behavior is then a deterministic pipeline of at
\* most 6 further states (5 counter serves + Finalize), bounding the space
\* by ~2.3x10^5 states (measured: 76,448 distinct, depth 7 — rejected reads
\* terminate early) — TLC exhausts it (safety + the three liveness
\* properties) in well under the harness timeout.
\*
\* The enumeration reaches every attack position x class:
\*   * LIE / STALE / FORGED on the FIRST counter — the bind gate, the
\*     stale-height gate, and the S-042 committee binding each fire
\*     (reason BIND / STALE_HEIGHT / UNATTESTED).
\*   * LIE / STALE / FORGED on a LATER counter (after an honest anchor) —
\*     the bind gate and the split-root guard fire (BIND / SPLIT_ROOT).
\*     A STALE later counter IS the split-root attack: an attested-but-
\*     old root differing from the resolved anchor.
\*   * all-HONEST over a conserving snapshot -> CONSERVED (the witness
\*     PROP_HonestConserved needs); all-HONEST over an underflowing
\*     snapshot (e.g. <<0,0,0,1,1>>) -> VIOLATED (PROP_HonestViolated).
\* Values = {0,1} suffices: the bind gate needs only value INEQUALITY
\* (injective-Encode abstraction), and the A1 closed form needs both
\* pos >= neg and neg > pos to be reachable — {0,1}^5 gives both.
\*
\* The six invariants hold at every reachable state; the three PROPERTIES
\* are checked under WF on the progress actions (the model terminates by
\* design — the harness's -deadlock flag treats the Done stutter as
\* benign). Probe_ConservedUnreachable is deliberately NOT listed: it is
\* the M0 non-vacuity probe (EXPECTED FALSIFIED — see the spec header's
\* dated probe table; adding it here would turn the green gate red).

CONSTANTS
    Values = {0, 1}
    NoVal  = 9

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_S1_SingleHeightTruth
    INV_S2_NoSplitRootAccept
    INV_S3_NoLiedValueAccept
    INV_FailClosed
    INV_VerdictFaithful

PROPERTIES
    PROP_EventualVerdict
    PROP_HonestConserved
    PROP_HonestViolated
