\* TLC configuration for AppliedReceiptRestore.tla
\* Model: 2 shards, 2 tx-hashes, 2 domains, MaxAmount=2, MaxHeight=4.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (SubmitReceipt /
\* ApplyFirstReceipt / ApplyDuplicate / TakeSnapshot / RestoreSnapshot /
\* TryDuplicatePostRestore) with realistic interleavings of the
\* apply / snapshot / restore lifecycle.
\*
\* Shards={s1, s2} gives a non-singleton shard set so the
\* Inv_DedupKeyIsPair invariant is non-trivial: TLC explores traces
\* where the same tx_hash appears in two different src_shards
\* (e.g., (s1, h1) and (s2, h1)) and verifies both appear as
\* distinct entries in applied_receipts (T-R3 lifted from FB14;
\* the snapshot/restore round-trip does not collapse the pair
\* structure into a single string).
\*
\* Hashes={h1, h2} with 2 shards gives 4 possible dedup keys:
\*   (s1, h1), (s1, h2), (s2, h1), (s2, h2)
\* The model can reach a substantial fraction of these in
\* applied_receipts within MaxHeight=4 action steps, including
\* multi-shard same-tx_hash variants that witness T-R3. (A third
\* hash adds no new property coverage — it only multiplies the
\* SubmitReceipt branching factor, |Receipt|^queue-depth.)
\*
\* Domains={a, b} gives two recipients so the per-domain
\* Inv_BalanceNonNegative invariant is non-trivial — TLC explores
\* traces where receipts target different recipients in interleaved
\* order and confirms each balance reflects only the unique-key
\* amounts targeting it.
\*
\* MaxAmount=2 lets per-receipt amounts range over {1, 2}
\* (zero-amount receipts are excluded to make the
\* accumulated_inbound monotonicity strict on ApplyFirstReceipt;
\* two distinct amounts keep the sum non-degenerate).
\* The Inv_AccumulatedConsistent invariant tracks the cumulative
\* sum across snapshot/restore boundaries.
\*
\* MaxHeight=4 is enough for the headline lifecycle:
\*   - SubmitReceipt + ApplyFirstReceipt cycle: queue r, apply r,
\*     applied_receipts grows by {KeyOf(r)}. (2 actions)
\*   - TakeSnapshot: saves the post-apply triple to snapshot_state.
\*     (1 action)
\*   - TryDuplicatePostRestore + ApplyDuplicate: submit a key in
\*     applied_receipts, verify ApplyDuplicate (not ApplyFirstReceipt)
\*     is enabled. T-AR3 witnessed. (2 actions; queue depth = 1)
\*   - RestoreSnapshot: rewind applied_receipts to snapshot's set.
\*     (1 action)
\*
\* Within the MaxHeight=4 bound the canonical "S-037 closure"
\* witness trace is:
\*   1. SubmitReceipt({s1, h1, a, 1}) — pending = <<(s1,h1,a,1)>>
\*   2. ApplyFirstReceipt({s1, h1, a, 1}) — applied = {(s1,h1)},
\*      balances[a] = 1, accumulated_inbound = 1
\*   3. TakeSnapshot — snapshot_state captures
\*      ({(s1,h1)}, [a->1, b->0], 1)
\*   4. RestoreSnapshot — applied_receipts = {(s1,h1)},
\*      balances[a] = 1, accumulated_inbound = 1.
\*      Inv_RestoreEqualsPre + Inv_DedupPersistsAcrossRestore
\*      witness the equal-to-snapshot post-state.
\*
\* The pre-S-037 bug shape (counter-factual) would have witnessed:
\*   4'. RestoreSnapshot pre-S-037 would have set applied_receipts to {}
\*      (dropping the dedup-set entry), allowing ApplyFirstReceipt
\*      to re-fire on the same key. The spec captures the
\*      post-S-037 behavior — the dedup-set survives verbatim.
\*
\* TLC reaches all reachable interleavings within MaxHeight=4:
\*   - ApplyFirstReceipt / ApplyDuplicate dispatch by current
\*     applied_receipts membership at the head of pending.
\*   - TakeSnapshot reachable at every reachable state (no
\*     pre-condition beyond height < MaxHeight).
\*   - RestoreSnapshot reachable iff snapshot_state /= NoSnapshot.
\*   - TryDuplicatePostRestore reachable iff applied_receipts is
\*     non-empty AND snapshot_state /= NoSnapshot.
\*
\* The Inv_FreshCreditPostRestore invariant is structurally
\* tautological (a fresh key not in applied_receipts is, by
\* construction, not in applied_receipts) — its purpose is to
\* document the contract that post-restore applied_receipts is
\* NOT a frozen freeze; subsequent ApplyFirstReceipt for fresh
\* keys is still admissible. The proper-superset witness is the
\* SubmitReceipt → RestoreSnapshot → SubmitReceipt(fresh) →
\* ApplyFirstReceipt trace, reachable within the model bound.
\*
\* Multi-snapshot trace coverage:
\*   - TakeSnapshot #1 captures empty applied_receipts (Init-time
\*     snapshot, distinguished from the NoSnapshot sentinel via the
\*     sentinel's impossible accumulated_inbound = -1: real snapshots
\*     always save a Nat).
\*   - SubmitReceipt + ApplyFirstReceipt extends applied_receipts.
\*   - TakeSnapshot #2 captures the extended set.
\*   - RestoreSnapshot loads the most-recent saved triple (#2);
\*     applied_receipts reverts to the #2 set.
\*
\* The snapshot_state field is mono-saved (single slot — the C++
\* serializer is one-snapshot-at-a-time at the apply layer);
\* multi-generation snapshot accumulation lives outside the apply
\* layer (out-of-scope per FB6 modeling).

CONSTANTS
    Shards    = {s1, s2}
    Hashes    = {h1, h2}
    Domains   = {a, b}
    MaxAmount = 2
    MaxHeight = 4

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_RestoreEqualsPre
    Inv_DedupPersistsAcrossRestore
    Inv_FreshCreditPostRestore
    Inv_AccumulatedConsistent
    Inv_BalanceNonNegative
    Inv_DedupKeyIsPair

PROPERTIES
    Prop_RestoreIdempotent
    Prop_NoDoubleApply
