\* TLC configuration for CrossShardOutboundApply.tla
\* Model: 2 domains, 2 shards, MyShard=s1, MaxAmount=3, MaxFee=2,
\*        InitialBalance=10, MaxHeight=3.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (SubmitTransfer /
\* ApplyLocalTransfer / ApplyCrossShardTransfer /
\* ApplyInsufficientBalance / FinalizeBlock) with realistic
\* interleavings of same-shard and cross-shard apply branches.
\*
\* Domains={a, b}, Shards={s1, s2}, MyShard=s1: domain `a` lives on
\* the source shard (the modeled shard, s1) and domain `b` lives on
\* the destination shard (s2). ROUTE is wired by CONSTANT
\* substitution (ROUTE <- RouteOracle, defined in the .tla — TLC's
\* cfg grammar accepts only literal constant values, not function
\* expressions), which pins the routing oracle so that (up to the
\* symmetric renaming of the CHOOSE-picked local domain):
\*   ROUTE[a] = s1 (local)
\*   ROUTE[b] = s2 (cross-shard from the source's POV)
\* The model treats `a -> b` as cross-shard, `a -> a` as local,
\* `b -> a` as cross-shard (with `b` as source), `b -> b` as local
\* (with `b` as source). Each of the four combinations is reachable
\* within MaxHeight=3 SubmitTransfer steps (not all four in a single
\* trace — TLC explores every interleaving, so each is covered). The
\* cross-shard branch is exercised any time the target's ROUTE value
\* differs from MyShard.
\*
\* MaxAmount=3 + MaxFee=2 lets each tx cost up to 5 (amount + fee).
\* InitialBalance=10 lets each sender absorb at most two consecutive
\* max-cost cross-shard transfers before falling below the cost gate
\* (the third one trips ApplyInsufficientBalance). This range
\* exercises:
\*   - 2 successful Cross steps (balance 10 -> 5 -> 0; the second
\*     drains to exactly 0 since 5 - 5 = 0)
\*   - 1 successful + 1 cost-gate failure (balance 10 -> 5; second
\*     attempt with cost > 5 hits InsufficientBalance)
\*   - Boundary cases at amount=1 fee=0 (minimum cost) and amount=3
\*     fee=2 (maximum cost). MaxAmount=3 gives 3 distinct positive
\*     amount values; MaxFee=2 gives 3 distinct fee values (0, 1, 2).
\*
\* MaxHeight=3 is enough to exhaust the canonical traces (and keeps
\* the pending_txs content space TLC-tractable: at most 3 submitted
\* txs per trace):
\*   1. Submit -> ApplyCrossShardTransfer: queue {a -> b, 1, 0},
\*      apply. accumulated_outbound = 1, pending_receipts has one
\*      entry with amount = 1. Inv_OutboundSumEqualsReceiptSum holds.
\*   2. Submit -> ApplyLocalTransfer: queue {a -> a, 1, 0}, apply.
\*      accounts[a].balance UNCHANGED (sender = recipient = a;
\*      debit a by 1+0 = 1, credit a by 1; net 0). The same-shard
\*      branch is exercised; accumulated_outbound preserved.
\*   3. Multi-step trace: Submit two cross-shard txs (a -> b, 2, 0)
\*      twice. ApplyCrossShardTransfer twice. accumulated_outbound
\*      = 4, pending_receipts has two entries each of amount 2.
\*      The sum invariant T-O4 holds; A1 source-mass conservation
\*      T-O1 holds per step.
\*   4. ApplyInsufficientBalance: drain a's balance to 0 via two
\*      Cross steps of amount 3 fee 2 (cost 3+2 = 5 each), then
\*      submit a third Cross tx of amount 2 (cost 2+0 = 2). a's
\*      balance = 10 - 5 - 5 = 0 < 2: ApplyInsufficientBalance.
\*      No state mutation; tx is consumed from queue but no receipt
\*      emitted, no accumulated_outbound bump.
\*
\* The fairness on all three apply branches (Local, Cross,
\* Insufficient) + FinalizeBlock drives Prop_EventualApply: any
\* non-empty pending_txs eventually drains under fair scheduling.
\* Without these fairness clauses, a trace could indefinitely
\* stutter on SubmitTransfer / FinalizeBlock and leave the queue
\* non-empty forever.
\*
\* Adversarial-scenario coverage:
\*   - Source-mass A1 verification: ApplyCrossShardTransfer of
\*     (a -> b, 3, 2): a's balance: 10 -> 5; accumulated_outbound:
\*     0 -> 3; pending_receipts: <<>> -> <<[to=b, amount=3]>>.
\*     T-O1 holds (sender debit = amount + fee = 5); T-O3 holds
\*     (b's balance unchanged); T-O4 holds (sum = 3 in both).
\*     Prop_SourceA1Conservation witnessed by the action invariant.
\*   - No-double-emission: each ApplyCrossShardTransfer appends
\*     exactly one entry; Prop_NoDoubleApply-style structural
\*     invariant is captured by the per-step Append-by-one
\*     semantics in the action definition.
\*   - Single-shard degeneracy: Inv_SingleShardNoOutbound is
\*     vacuously true with |Shards| = 2 (the antecedent is false);
\*     to verify the structural unreachability of cross-shard in
\*     the single-shard case, run a separate cfg variant with
\*     Shards = {s1} (commented below); accumulated_outbound stays
\*     at 0 across every reachable state.
\*
\* Multi-tx pending queues are reachable from this configuration:
\* SubmitTransfer can fire up to MaxHeight = 3 times (each fire
\* consumes one height unit; height also caps FinalizeBlock, keeping
\* the state space finite), exercising the FIFO drain semantics under
\* mixed Local/Cross/Insufficient interleavings.
\*
\* To explore the single-shard degenerate case (T-O7 verification),
\* set:
\*   CONSTANTS
\*       Domains        = {a, b}
\*       Shards         = {s1}
\*       MyShard        = s1
\*       MaxAmount      = 3
\*       MaxFee         = 2
\*       InitialBalance = 10
\*       MaxHeight      = 3
\* keeping the ROUTE <- RouteOracle substitution: with Shards = {s1}
\* RouteOracle maps every domain to s1. TLC will exhaust the bounded
\* state space and confirm that accumulated_outbound stays at 0
\* across every reachable state (the IsCrossShard helper returns
\* FALSE structurally).

CONSTANTS
    Domains        = {a, b}
    Shards         = {s1, s2}
    MyShard        = s1
    MaxAmount      = 3
    MaxFee         = 2
    InitialBalance = 10
    MaxHeight      = 3

\* ROUTE is a function value (Domains -> Shards); TLC's cfg grammar
\* cannot express function literals, so it is substituted with the
\* RouteOracle operator defined in the .tla (a -> s1 local,
\* b -> s2 cross, up to {a, b} symmetry).
CONSTANT ROUTE <- RouteOracle

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_BalanceNonNegative
    Inv_OutboundMonotonic
    Inv_OutboundSumEqualsReceiptSum
    Inv_SingleShardNoOutbound

PROPERTIES
    Inv_NoLocalCreditOnCrossShard
    Prop_EventualApply
    Prop_SourceA1Conservation
