\* TLC configuration for UnitarySupplyLedger.tla
\* Model: 3 domains {a, b, c}, GenesisTotal = 12, MaxDelta = 3,
\* MaxSteps = 5.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every one of the seven apply-layer actions (Transfer
\* / StakeLock / StakeUnlock / MintSubsidy / InboundReceipt /
\* OutboundDebit / SlashStake) across realistic interleavings.
\*
\* GenesisTotal = 12 with |Domains| = 3 gives an exact equal allocation
\* of 4 per domain at Init (ConfigOK requires GenesisTotal % |Domains| =
\* 0, so the genesis sum is exactly 12 with no dust). The genesis_total_
\* pin at chain.cpp:711 is the source analogue.
\*
\* MaxDelta = 3 keeps each per-action amount in 1..3, so a single
\* MintSubsidy / InboundReceipt can grow LiveSupply by at most 3 and a
\* single SlashStake / OutboundDebit can shrink it by at most 3. With
\* MaxSteps = 5, the maximum cumulative mint is 2 * 3 * 5 = 30 (subsidy +
\* inbound), bounding every balance / stake at GenesisTotal + 30 = 42 —
\* the Inv_TypeOK ceiling.
\*
\* MaxSteps = 5 caps the action count. Five steps is enough to witness:
\*   - a StakeLock then SlashStake on the same domain (the burn path that
\*     removes value from the live pool via the locked component),
\*   - a MintSubsidy then OutboundDebit (a +subsidy followed by an
\*     -outbound, net-zero on the identity but both accumulators bumped),
\*   - an InboundReceipt then StakeLock (cross-shard credit followed by an
\*     internal balance->stake move),
\* all while Inv_A1UnitarySupply holds at every intermediate state.
\*
\* Coverage matrix (one exhaustive trace within MaxSteps = 5):
\*   - MintSubsidy(a, 2)    -> balance[a]=6, acc_subsidy=2          (step 1)
\*   - StakeLock(a, 3)      -> balance[a]=3, locked[a]=3            (step 2)
\*   - SlashStake(a, 2)     -> locked[a]=1, acc_slashed=2           (step 3)
\*   - InboundReceipt(b, 1) -> balance[b]=5, acc_inbound=1          (step 4)
\*   - OutboundDebit(c, 1)  -> balance[c]=3, acc_outbound=1         (step 5)
\* End state: balances a=3 b=5 c=3 (=11), locked a=1 (=1), so
\* LiveSupply = 11 + 1 = 12. TLC verifies the exact identity
\* LiveSupply + slashed + outbound = genesis + subsidy + inbound at every
\* reachable state (here: 12 + 2 + 1 = 12 + 2 + 1 = 15).
\*
\* Inv_A1UnitarySupply is the headline: verified across every reachable
\* state, the five-term ledger closes. The interleaving freedom in Next
\* lets TLC explore all orderings of the seven actions, so the identity
\* is checked under the full composition — not just the single canonical
\* trace above.
\*
\* Inv_NoNegativeUnderflow guards the Nat-closure: every SlashStake /
\* OutboundDebit is gated on a sufficient locked / balance pre-condition,
\* so the subtracted accumulator terms can never exceed the added terms,
\* and the C++ uint64 subtraction at chain.cpp:1397 cannot wrap.

CONSTANTS
    Domains      = {a, b, c}
    GenesisTotal = 12
    MaxDelta     = 3
    MaxSteps     = 5

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_A1UnitarySupply
    Inv_NoNegativeUnderflow
    Inv_LiveDecomposition

PROPERTIES
    Inv_AccumulatorsMonotone
    Prop_SupplyAlwaysCloses
    Prop_OnlyAccountedDeltas
