\* TLC configuration for AnonAccountLifecycle.tla
\* Model: PubKeys = {k1, k2}, Amounts = {1, 2}, MaxOps = 4.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every credit path + the S-028 strict-reject branch across
\* realistic interleavings of mixed-case spellings.
\*
\* PubKeys = {k1, k2}: two distinct Ed25519 pubkeys, so the
\* non-fragmentation invariant (INV_NoCaseFragmentation) is non-trivial —
\* TLC must distinguish "two case-variants of ONE pubkey" (which MUST
\* collapse to one canonical entry) from "two genuinely distinct pubkeys"
\* (which legitimately occupy two entries). With one pubkey the invariant
\* would hold vacuously; two pubkeys force the discriminator.
\*
\* Amounts = {1, 2}: two positive credit amounts so INV_CreditConservation
\* (credited_sum == SumBalances + QueuedSum) is exercised with mixed
\* values — a 1 then a 2 to the same canonical key accumulates to 3 in one
\* entry, witnessing both auto-create (first credit seeds 0 then adds) and
\* accumulate-into-existing (second credit normalizes to the same key).
\*
\* MaxOps = 4 caps the combined queued + settled + rejected count. Four
\* operations is enough to witness the headline adversarial trace:
\*   - CreditNormalized(k1, UPPER, 1, TRANSFER)  -> queues canon(k1)+=1
\*   - CreditNormalized(k1, MIXED, 2, INBOUND_RECEIPT) -> queues canon(k1)+=2
\*   - Apply x2 -> ledger[canon(k1)] = 3 in ONE entry (NOT fragmented
\*       across an UPPER key and a MIXED key)
\*   - SubmitTx(k2, UPPER, 1) -> REJECTED (non-canonical), logged, NOT
\*       credited
\* End state: ledger holds exactly one canonical entry for k1 (balance 3),
\* no entry for k2 (its only credit attempt was a non-canonical submit
\* that was shed), routed log holds two canonical-key entries, rejected
\* log holds one non-canonical entry. TLC verifies that across EVERY
\* reachable interleaving:
\*   - INV_NoCaseFragmentation: no two distinct ledger keys share a Canon
\*       (the UPPER + MIXED credits to k1 landed in the SAME canonical key).
\*   - INV_AllKeysCanonical: every ledger key is its own canonical form.
\*   - INV_RoutingCanonical: every routed entry's key is canonical.
\*   - INV_CreditConservation: the accepted-amount accumulator equals the
\*       settled balances plus the still-queued amounts at every state.
\*   - INV_NoNonCanonicalSubmitApplied: every rejected entry is genuinely
\*       non-canonical (a canonical submit is never spuriously rejected).
\*
\* The interleaving freedom in Next lets TLC explore all orderings of
\* CreditNormalized / SubmitTx / Apply, so the non-fragmentation +
\* conservation properties are checked under the full composition — not
\* just the single canonical trace above. The deliberate adversarial cases
\* TLC reaches include: UPPER-then-LOWER-then-MIXED credits to one pubkey
\* (all must collapse), a non-canonical submit interleaved between two
\* credits, and a canonical submit accepted alongside a rejected one.

CONSTANTS
    PubKeys = {k1, k2}
    Amounts = {1, 2}
    MaxOps  = 4

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_AllKeysCanonical
    INV_NoCaseFragmentation
    INV_RoutingCanonical
    INV_CreditConservation
    INV_NoNonCanonicalSubmitApplied
    INV_NonNegativeBalances

PROPERTIES
    PROP_EventualSettle
