\* TLC configuration for SubsidyDistribution.tla
\* Model: 3 domains, BlockSubsidy=4, MaxHeight=4, InitialNefPool=8,
\* MaxCreators=3.
\*
\* Subsidy mode: FLAT (subsidy_mode = 0). The active Next disjunct
\* models FLAT distribution; LOTTERY and FINITE_POOL variants are
\* commented in the .tla file for cfg-level swap. FLAT is the genesis
\* default and the simplest mode for state-space exhaustion.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (Register / ReRegister /
\* FinalizeBlock / AdvanceHeightNoMint) with realistic interleavings.
\*
\* InitialNefPool=8 lets the floor-half drain fire 4 times before
\* reaching zero (8 -> 4 -> 2 -> 1 -> 0), witnessing the terminal
\* `0 \div 2 = 0` case. With 3 domains, at most 3 Register actions
\* fire; the 4th drain step (and beyond) only manifests in a model
\* with more domains than registrations. Here we get the 8 -> 4 -> 2 -> 1
\* prefix exercised across (a,b,c) Register interleavings.
\*
\* MaxHeight=4 + BlockSubsidy=4 gives a maximum accumulated_subsidy of
\* 16 (all four blocks have non-empty creators). The empty-creators
\* branch is exercised by the Len(creators) = 0 sequence in SeqsOfSize.
\*
\* MaxCreators=3 = Cardinality(Domains) lets every possible distinct-
\* creators sequence be enumerated: empty, singletons (3), pairs (6
\* ordered = 3*2), triples (6 ordered = 3!).
\*
\* Register-then-ReRegister-then-FinalizeBlock-then-tick is reachable;
\* multi-domain Register interleaving is reachable; the empty-creators
\* FinalizeBlock no-mint case is reachable; the AdvanceHeightNoMint
\* stutter is reachable.

CONSTANTS
    Domains        = {a, b, c}
    BlockSubsidy   = 4
    MaxHeight      = 4
    InitialNefPool = 8
    MaxCreators    = 3

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_BalanceNonNegative
    Inv_NefPoolNonNegative
    Inv_SubsidyConservation

PROPERTIES
    Inv_AccumulatedSubsidyMonotonic
    Inv_EmptyCreatorsNoMint
    Inv_NefDrainsOnceperDomain
    Prop_EventualSubsidy
    Prop_RegistrationIdempotent
