\* TLC configuration for GovernanceParamChange.tla
\* Model: 3 keyholders, 2 whitelist names (abstracted), Threshold=2 (2-of-3),
\* MaxHeight=4, MaxValue=2.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (SubmitParamChange /
\* RejectSubmitOffWhitelist / RejectSubmitBelowThreshold /
\* Activate / AdvanceHeight) with realistic interleavings of legitimate
\* and adversarial calls.
\*
\* Threshold=2 with |Keyholders|=3 gives a non-trivial threshold gate:
\* signer-set cardinalities of 0/1 are rejected (witnessing
\* Inv_ThresholdRespected), cardinalities of 2/3 are accepted. The
\* 2-of-3 threshold is the smallest non-trivial M-of-N case; the
\* default N-of-N (where Threshold == Cardinality(Keyholders)) is
\* also reachable by setting Threshold = 3 (model variant, not the
\* default cfg).
\*
\* MaxHeight=4 is enough for:
\*   - submissions at h=0 with effective \in {0..4}
\*   - the effective=0 case drains immediately on next Activate
\*   - the effective=4 case drains only at h=4 (witnesses
\*     Prop_EventualActivation upper bound)
\*   - the effective>height case witnesses Inv_NoEarlyActivation
\*     (entry persists in pending until height catches up)
\*   - the AdvanceHeight + Activate fairness cycle drives the
\*     liveness property
\*
\* MaxValue=2 lets `chain_param` and `validator_param` range over
\* {0, 1, 2}. The Init state has both at 0; Activate may push them
\* to 1 or 2. The Inv_ValidatorChainSync invariant ensures they
\* never diverge — TLC explores every (chain_param, validator_param)
\* combination and confirms they always coincide.
\*
\* Whitelist={p1, p2} gives a non-singleton whitelist so that
\* the Update action can mutate two distinct parameters. The
\* OffWhitelist={x1} constant carries an adversarial-domain name
\* that the RejectSubmitOffWhitelist action draws from; the
\* ConfigOK assumption requires Whitelist \cap OffWhitelist = {}
\* so the two sets are disjoint.
\*
\* Multi-entry pending sequences are reachable: e.g., submit at
\* h=0 with effective=4, then submit at h=0 with effective=2, then
\* tick height to 2 — the second entry becomes eligible while the
\* first remains queued. The Inv_NoEarlyActivation invariant
\* witnesses that the eligible entry is at position 2 (not 1) and
\* Activate drains in head-first order. Note: under the current
\* sequence-based model, this would actually violate the
\* head-first-eligibility invariant — which is the correct
\* outcome because the C++ uses a std::map keyed by eff_height
\* (ascending iteration), not insertion order across different
\* eff_heights. TLC will catch this discrepancy if it occurs,
\* highlighting the modeling decision: the spec captures the
\* C++ behavior under realistic submission orderings where
\* earlier-eff submissions arrive first. The state-space exploration
\* also exercises the reverse-order submission case as a
\* "spec-vs-code" sanity check.
\*
\* Register-then-submit-then-tick-past-effective,
\* Submit-then-non-keyholder-attempt-then-legitimate-submit,
\* multi-name interleavings, and double-Activate attempts (blocked
\* by the HasEligible guard once the head is drained) are all
\* reachable from this configuration.

CONSTANTS
    Keyholders   = {a, b, c}
    Whitelist    = {p1, p2}
    OffWhitelist = {x1}
    Threshold    = 2
    MaxHeight    = 4
    MaxValue     = 2

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_WhitelistRespected
    Inv_ThresholdRespected
    Inv_NoEarlyActivation
    Inv_ValidatorChainSync

PROPERTIES
    Inv_NoDoubleApply
    Prop_EventualActivation
    Prop_UnauthorizedRejection
