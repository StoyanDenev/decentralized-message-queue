\* TLC configuration for GovernanceParamChange.tla
\* Model: 3 keyholders, 1 whitelist name (abstracted), Threshold=2 (2-of-3),
\* MaxHeight=2, MaxValue=1.
\*
\* Sizing note: measured, not estimated — this configuration exhausts at
\* 33,174 distinct states (depth 8) in ~30s single-worker including the
\* three liveness branches. Larger sizings blow up combinatorially in the
\* sorted pending queue (queue bound = MaxHeight+1; entry diversity =
\* names x values x eff x signer-sets): MaxHeight=4/MaxValue=2/2 names
\* exceeds 10^7 distinct states and cannot finish inside the harness
\* timeout. The reductions are semantics-preserving: parameter names and
\* values are inert payload (no per-name state; the state-machine
\* properties are uniform across them), so one whitelist name and a
\* {0,1} value range exercise every action disjunct (SubmitParamChange /
\* RejectSubmitOffWhitelist / RejectSubmitBelowThreshold / Activate /
\* AdvanceHeight) with the same legitimate/adversarial interleavings.
\*
\* Threshold=2 with |Keyholders|=3 gives a non-trivial threshold gate:
\* signer-set cardinalities of 0/1 are rejected (witnessing
\* Inv_ThresholdRespected), cardinalities of 2/3 are accepted. The
\* 2-of-3 threshold is the smallest non-trivial M-of-N case; the
\* default N-of-N (where Threshold == Cardinality(Keyholders)) is
\* also reachable by setting Threshold = 3 (model variant, not the
\* default cfg).
\*
\* MaxHeight=2 is enough for:
\*   - submissions at h=0 with effective \in {0..2}
\*   - the effective=0 case drains immediately on next Activate
\*   - the effective=2 case drains only at h=2 (witnesses
\*     Prop_EventualActivation upper bound)
\*   - the effective>height case witnesses Inv_NoEarlyActivation
\*     (entry persists in pending until height catches up)
\*   - the AdvanceHeight + Activate fairness cycle drives the
\*     liveness property
\*
\* MaxValue=1 lets `chain_param` and `validator_param` range over
\* {0, 1}. The Init state has both at 0; Activate may push them
\* to 0 or 1. The Inv_ValidatorChainSync invariant ensures they
\* never diverge — TLC explores every (chain_param, validator_param)
\* combination and confirms they always coincide.
\*
\* Whitelist={p1} is a singleton: parameter names carry no per-name
\* state in the model (the eight-name whitelist is abstracted to one
\* `chain_param` variable), so a second name only multiplies the
\* state space without new behavior. The OffWhitelist={x1} constant
\* carries an adversarial-domain name that the
\* RejectSubmitOffWhitelist action draws from; the ConfigOK
\* assumption requires Whitelist \cap OffWhitelist = {} so the two
\* sets are disjoint.
\*
\* Multi-entry pending sequences are reachable: e.g., submit at
\* h=0 with effective=2, then submit at h=0 with effective=1, then
\* tick height to 1. SubmitParamChange stages via InsertSorted
\* (sorted on effective, ties broken by insertion order), mirroring
\* the C++ std::map<eff_height, vector<...>> ordering — so the
\* effective=1 entry sits at position 1 ahead of the effective=2
\* entry regardless of submission order, and eligible entries are
\* always a head-contiguous prefix. Inv_NoEarlyActivation witnesses
\* exactly this head-contiguity, including under reverse-order
\* submission interleavings.
\*
\* Register-then-submit-then-tick-past-effective,
\* Submit-then-non-keyholder-attempt-then-legitimate-submit,
\* multi-name interleavings, and double-Activate attempts (blocked
\* by the HasEligible guard once the head is drained) are all
\* reachable from this configuration.

CONSTANTS
    Keyholders   = {a, b, c}
    Whitelist    = {p1}
    OffWhitelist = {x1}
    Threshold    = 2
    MaxHeight    = 2
    MaxValue     = 1

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_WhitelistRespected
    Inv_ThresholdRespected
    Inv_NoEarlyActivation
    Inv_ValidatorChainSync

PROPERTIES
    Inv_NoDoubleApply
    Prop_EventualActivation
    Prop_UnauthorizedRejection
