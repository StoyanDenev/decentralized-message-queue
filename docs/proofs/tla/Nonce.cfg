\* TLC configuration for Nonce.tla
\* Model: 3 domains, MaxNonce=4, MaxAmount=2, MaxBalance=5.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (SubmitTx / ApplyTx /
\* RemoveFromPending) with realistic interleavings of replay
\* attempts, stale-nonce submissions, future-nonce submissions,
\* and mempool gc.
\*
\* The MaxAmount=2 / MaxBalance=5 ratio lets each account witness
\* multiple TRANSFER-shape applies (up to floor(5/1)=5 with
\* amount=1, or floor(5/2)=2 with amount=2) before the
\* balance-sufficient guard blocks further apply. MaxNonce=4
\* ensures the bounded-nonce-space corner case (next_nonce =
\* MaxNonce) is reached in some traces, so the
\* `next_nonce < MaxNonce` precondition in ApplyTx is exercised.
\*
\* Submit-then-apply, submit-then-gc, double-submit, replay-after-
\* apply, and future-nonce-then-catch-up are all reachable from
\* this configuration.

CONSTANTS
    Domains      = {a, b, c}
    MaxNonce     = 4
    MaxAmount    = 2
    MaxBalance   = 5

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_GenesisLowerBound
    Inv_StrictNonceGate
    Inv_ReplayImpossible
    Inv_NoStaleApplied

PROPERTIES
    Inv_NonceMonotonic
    Inv_AppliedMonotone
    Inv_PerAccountIndependence
    Inv_ApplyAdvancesNonce
    Prop_EventualNonceAdvance
    Prop_NoStaleApplied
