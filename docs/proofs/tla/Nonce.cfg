\* TLC configuration for Nonce.tla
\* Model: 2 domains, MaxNonce=1, MaxAmount=2, MaxBalance=2.
\*
\* Sizing rationale: `pending` is a SUBSET of Tx and SubmitTx is
\* unconditional, so the reachable state space contains all 2^|Tx|
\* pending subsets. |Tx| = |Domains| * (MaxNonce+1) * MaxAmount must
\* stay small for TLC to exhaust under the liveness check (the
\* leads-to property forks one branch per Tx record). This config
\* gives |Tx| = 2*2*2 = 8, which TLC exhausts in seconds.
\*
\* MaxAmount=2 is load-bearing: it makes two distinct Tx records with
\* the same {from, nonce} but different amounts reachable, so TLC
\* exercises the scenario where one of them applies and the other is
\* left permanently stale in pending — exactly the trace that
\* requires the WF(RemoveFromPending) fairness (the M11 stale-nonce
\* sweep) for Prop_EventualNonceAdvance to hold.
\*
\* Submit-then-apply, submit-then-gc, double-submit (same nonce,
\* different amount), replay-after-apply, future-nonce rejection,
\* and the bounded-nonce-space corner (next_nonce = MaxNonce blocks
\* further apply) are all reachable from this configuration.

CONSTANTS
    Domains      = {a, b}
    MaxNonce     = 1
    MaxAmount    = 2
    MaxBalance   = 2

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_GenesisLowerBound
    Inv_StrictNonceGate
    Inv_ReplayImpossible
    Inv_NoStaleApplied

PROPERTIES
    Inv_NonceMonotonic
    Inv_AppliedMonotone
    Inv_PerAccountIndependence
    Inv_ApplyAdvancesNonce
    Prop_EventualNonceAdvance
    Prop_NoStaleApplied
