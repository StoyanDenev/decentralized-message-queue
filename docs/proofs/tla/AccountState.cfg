\* TLC configuration for AccountState.tla
\* Model: 3 domains, balance bound 2, nonce bound 2, height bound 2.
\* Sized for the CI budget (120s/config): 180,270 distinct states,
\* depth 17, ~20s measured (~40s under CPU contention). The previous
\* sizing (balance 4, nonce 3, height 4) exceeded a 300s timeout.
\* These bounds still exercise every action disjunct (Transfer / Stake /
\* UnstakeStart / UnstakeComplete / Slash / Tick) with realistic
\* interleavings: partial slash (stake 2, slash 1), re-stake while an
\* unstake is armed, staggered unstakes across domains (unlock 1 vs 2),
\* and unstake-complete refund cycles.

CONSTANTS
    Domains      = {alice, bob, carol}
    MaxBalance   = 2
    MaxNonce     = 2
    MaxHeight    = 2

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_NoNegativeBalance
    Inv_NoNegativeStake
    Inv_NonceBounded
    Inv_SupplyConservation

PROPERTIES
    Inv_NonceMonotonic
    Inv_BalanceStakeIndependence
    Inv_SlashedMonotonic
