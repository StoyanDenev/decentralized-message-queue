\* TLC configuration for AccountState.tla
\* Model: 3 domains, balance bound 4, nonce bound 3, height bound 4.
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (Transfer / Stake / UnstakeStart /
\* UnstakeComplete / Slash / Tick) with realistic interleavings.

CONSTANTS
    Domains      = {alice, bob, carol}
    MaxBalance   = 4
    MaxNonce     = 3
    MaxHeight    = 4

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_NoNegativeBalance
    Inv_NoNegativeStake
    Inv_NonceBounded
    Inv_SupplyConservation

PROPERTIES
    Inv_NonceMonotonic
    Inv_BalanceStakeIndependence
    Inv_SlashedMonotonic
