\* TLC configuration for CompositeKeyStateProof.tla (FB43).
\* Model: 1 simple ns (a), 1 counter ns (c), 2 composite ns (i, m),
\* 1 unsupported sentinel (x); 4 raw keys spanning the gate cases;
\* MaxRequests=3; a small committed-key subset.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every disjunct of the five-stage decision tree
\* (unsupported / invalid_hex / wrong_length / not_found / proof) with
\* realistic interleavings of Request actions against the fixed
\* committed leaf set.
\*
\* Namespace classes (disjointness asserted by ASSUME ConfigOK):
\*   SimpleNamespaces    = {a}          — ASCII-suffix leaf
\*   CounterNamespace    = {c}          — rides in k: as "k:c:" ++ name
\*   CompositeNamespaces = {i, m}       — hex-encoded binary body leaves
\*   UnsupportedNs       = {x}          — outside the ten-namespace set
\*
\* WidthOf gives the exact composite body widths (node.cpp:3341-3343):
\*   i -> 40 bytes (src_be8 + tx_hash[32])   => valid hex is 80 chars
\*   m -> 4  bytes (shard_be4)               => valid hex is  8 chars
\* (p -> 12 is omitted from this small model to keep RawKeys minimal;
\*  the i + m pair already exercises both the long-body and short-body
\*  width gates, which is what INV_WidthGate needs.)
\*
\* RawKeys — four opaque raw keys chosen to hit each gate:
\*   simple_a   : the ASCII suffix for the a: namespace.
\*                ValidHexOf = FALSE (irrelevant: a: skips the hex gate),
\*                HexLenOf   = 0     (irrelevant: a: skips the width gate).
\*   hex_i_ok   : a valid 80-char hex string for the i: namespace.
\*                ValidHexOf = TRUE, HexLenOf = 80 = 2*WidthOf[i].
\*                Passes both composite gates -> not_found or proof.
\*   hex_badlen : a valid hex string of the WRONG width (8 chars).
\*                ValidHexOf = TRUE, HexLenOf = 8.
\*                For i: this fails WidthGateOk (8 /= 80) -> wrong_length
\*                (the T-CK4 anti-aliasing witness: an 8-char body cannot
\*                 alias the 80-char i: key). For m: it PASSES
\*                (8 = 2*WidthOf[m]) -> not_found or proof.
\*   not_hex    : a non-hex string. ValidHexOf = FALSE, HexLenOf = 0.
\*                For composite ns -> invalid_hex (the T-CK3 witness).
\*
\* committed_keys — the leaf domain the tree committed at this
\* state-root. We commit:
\*   <<a,        simple_a>>  — so an a: request for simple_a -> proof.
\*   <<i,        hex_i_ok>>  — so an i: request for hex_i_ok  -> proof.
\*   <<m,        hex_badlen>>— so an m: request for hex_badlen -> proof
\*                             (hex_badlen is width-valid for m:).
\* Every OTHER (ns, raw) canonical key is ABSENT, so well-formed
\* requests for them route to not_found (the T-CK5 absence witness).
\*
\* MaxRequests=3 bounds served_log for tractability (state space
\* sum_{k<=3} 20^k = 8,421; a bound of 5 explodes to ~3.4M states,
\* which does not fit the model-check harness budget). No invariant
\* needs all five outcome classes in ONE trace — every invariant is
\* per-record over the log, and TLC tries all 20 (ns, raw) requests
\* from every state, so depth 1 already reaches each class:
\*   Request(x, *)         -> unsupported  (T-CK2)
\*   Request(i, not_hex)   -> invalid_hex  (T-CK3)
\*   Request(i, hex_badlen)-> wrong_length (T-CK4; 8 /= 80)
\*   Request(i, hex_i_ok)  -> proof, key_bytes = <<i, hex_i_ok>> (T-CK1)
\*   Request(m, simple_a)  -> not_found (well-formed-but-absent; T-CK5)
\* Depth 2 covers every identical-request pair (the
\* PROP_DeterministicReplay witness); depth 3 adds a differing record
\* between replays. TLC explores all reachable interleavings of the
\* 20 requests within the bound; the six invariants hold at every
\* reachable state.
\*
\* INV_WidthGate (T-CK4) is non-trivial under this config: the
\* hex_badlen key is width-valid for m: (proof-eligible) but
\* width-INVALID for i: (wrong_length-routed). TLC verifies that no
\* i: + hex_badlen request ever produces a proof, while an m: +
\* hex_badlen request for a committed key does — proving the width
\* gate is per-namespace and cannot be aliased across namespaces.

\* Namespaces + raw keys are STRING literals (not model values): the
\* function/tuple constants below cannot be written as cfg literals
\* (TLC's cfg parser accepts only scalar/set literals), so they are
\* bound (<-) to the MC_* operators in CompositeKeyStateProof.tla
\* (section 0b) — and module operators cannot reference cfg-declared
\* model values.
CONSTANTS
    SimpleNamespaces    = {"a"}
    CounterNamespace    = {"c"}
    CompositeNamespaces = {"i", "m"}
    UnsupportedNs       = {"x"}
    RawKeys             = {"simple_a", "hex_i_ok", "hex_badlen", "not_hex"}

    WidthOf       <- MC_WidthOf
    ValidHexOf    <- MC_ValidHexOf
    HexLenOf      <- MC_HexLenOf
    CommittedKeys <- MC_CommittedKeys

    MaxRequests = 3

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_CanonicalKeySound
    INV_UnsupportedRejected
    INV_HexGate
    INV_WidthGate
    INV_AbsenceSound
    \* PROP_DeterministicReplay is a state predicate (holds at every
    \* reachable state), so TLC checks it as an invariant.
    PROP_DeterministicReplay

PROPERTIES
    PROP_EventualAnswer
