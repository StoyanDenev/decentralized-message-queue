\* TLC configuration for Snapshot.tla
\* Model: 3 domains, MaxHeight=4, MaxBalance=5, SnapshotVersion=1.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (AppendBlock / TakeSnapshot /
\* RestoreSnapshot / RejectMalformedSnapshot) with realistic
\* interleavings of serialize-restore round-trips and adversarial
\* malformed-snapshot injections.
\*
\* The wrong-version domain in Inv_VersionGateSoundness ranges over
\* (0..3) \ {1} = {0, 2, 3}, which is enough to witness both
\* below-canonical and above-canonical rejections without blowing
\* up TLC's branching factor.

CONSTANTS
    Domains          = {a, b, c}
    MaxHeight        = 4
    MaxBalance       = 5
    SnapshotVersion  = 1

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_SerializeRestoreIdentity
    Inv_ApplyAfterRestoreEquivalence
    Inv_VersionGateSoundness
    Inv_DeterministicSerialization
    Inv_StateRootBindsApply

PROPERTIES
    Prop_EventualSnapshotConsistency
    Prop_RestoreIsCorrect
