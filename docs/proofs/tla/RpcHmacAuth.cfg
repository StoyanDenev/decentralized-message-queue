\* TLC configuration for RpcHmacAuth.tla
\* Model: RpcSecrets = {"s1", "s2"}, Messages = {"body1", "body2"},
\*        MaxRequests = 4.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (ConfigureSecret /
\* IssueAuthorizedRequest / IssueForgedRequest / ProcessRequest)
\* with realistic interleavings of secret-rotation, legitimate-
\* request issuance, adversarial-forge attempts, and pipeline-
\* dequeue ordering.
\*
\* RpcSecrets = {"s1", "s2"} gives 2 distinct secret values:
\*   - s1 is the initial secret target via ConfigureSecret.
\*   - s2 gives a non-trivial rotation target — ConfigureSecret can
\*     rotate from s1 to s2 mid-run and the spec's pending_requests
\*     issued under s1 will then REJECT under s2's expected-Hmac.
\*   - With |RpcSecrets| = 2, the rotation surface is reachably
\*     exercised; INV_NoForgedAccepted holds because each log
\*     entry's `secret` field captures the server_secret AT THE
\*     TIME OF PROCESSING (which may differ from the secret the
\*     legitimate caller used pre-rotation).
\*
\* Messages = {"body1", "body2"} gives 2 distinct request bodies:
\*   - body1 + body2 give a non-trivial Hmac-output surface:
\*     |HmacOutputs| = |RpcSecrets| × |Messages| = 4 canonical
\*     outputs the adversary must AVOID picking by chance.
\*   - ForgedHeaders = {"FORGED"} (single sentinel) is structurally
\*     disjoint from HmacOutputs — the adversary cannot pick a
\*     canonical Hmac output without breaking the abstract-Hmac
\*     pre-image resistance.
\*
\* MaxRequests = 4 bounds auth_log + pending_requests growth so TLC
\* exhausts in seconds. The bound exercises:
\*   - Init at all-empty (no server_secret, no log, no pending).
\*   - ConfigureSecret(s1) → server_secret = s1.
\*   - IssueAuthorizedRequest(body1) → pending_requests grows to 1.
\*   - IssueForgedRequest(body2, "FORGED") → pending_requests grows to 2.
\*   - ProcessRequest → auth_log grows to 1 (the s1+body1 ACCEPT);
\*     pending_requests shrinks to 1.
\*   - ProcessRequest → auth_log grows to 2 (the body2+"FORGED"
\*     REJECT); pending_requests shrinks to 0.
\*   - ConfigureSecret(s2) → server_secret rotates to s2.
\*   - IssueAuthorizedRequest(body1) → pending_requests grows to 1
\*     with auth_header = Hmac(s2, body1).
\*   - ProcessRequest → auth_log grows to 3 (the s2+body1 ACCEPT
\*     under the new secret).
\*   - At MaxRequests = 4 the Stutter action pins the bounded state
\*     space; PROP_EventualReject + PROP_NoForgeryWithoutSecret
\*     witnesses the rotation + reject composition.

CONSTANTS
    RpcSecrets  = {"s1", "s2"}
    Messages    = {"body1", "body2"}
    MaxRequests = 4

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_NoForgedAccepted
    INV_ConstantTimeCompare
    INV_SecretConfidentiality
    INV_NoAuthBypass

PROPERTIES
    PROP_EventualReject
    PROP_NoForgeryWithoutSecret
