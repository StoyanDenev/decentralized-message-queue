\* TLC configuration for SubscriberCatchupPartition.tla (FB72).
\* Model: MAX_BLOCKS = 4 (applied-block bound; the chain grows over indices
\* 0..3, each carrying 0-or-1 matching event fixed at Init). 4 is the
\* smallest exhibit that reaches every partition shape: a matching block
\* strictly BELOW regHead (catch-up half), a matching block AT regHead (the
\* boundary N, live half), a matching block ABOVE regHead (live half), and
\* the empty / all-matching extremes — all against every interleaving of
\* Apply / Subscribe (atomic capture+register) / CatchUp / Drain, with
\* `since` fixed at 0 (widest catch-up window).
\*
\* Init enumerates every matching \subseteq {0,1,2,3} (16 chains); the
\* Subscribe step can fire at any head 0..4, so every (chain, regHead)
\* position — matching event before / at / after the captured head — is
\* explored. This covers the atomicity crux from both sides: a matching
\* block applied BEFORE subscribe lands in catch-up [0, regHead); one
\* applied AT OR AFTER subscribe lands in the live half [regHead, head].
\*
\* Measured (tla2tools v1.8.0, java 11, 2026-07-04): 1346 distinct states,
\* depth 11, checked in ~3s — well under the harness 240s / ~2M-state
\* budget. The three safety INVARIANTS hold at every
\* reachable state; the temporal PROPERTY is checked under the Spec fairness
\* (WF on Subscribe, CatchUp, Drain — liveness-only; safety is
\* fairness-independent). The harness runs with -deadlock (deadlock-as-error
\* OFF): the chain-idle / fully-drained terminal states are benign exhibits.
\*
\* Probe_LiveBoundaryUnreachable is deliberately NOT listed: it is the M0
\* reachability probe (EXPECTED FALSIFIED — see the spec header's dated
\* probe table; listing it here would turn the green gate red).

CONSTANTS
    MAX_BLOCKS = 4

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_NoGap
    INV_NoOverlap
    INV_HeadMonotone

PROPERTIES
    PROP_AllEventuallyDelivered
