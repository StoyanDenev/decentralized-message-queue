\* TLC configuration for DAppRegistry.tla
\* Model: 2 domains, 1 topic, MaxHeight=4, DappGrace=3, Sentinel=1000,
\* InitialNefPool=2.
\*
\* Sizing note: measured, not estimated — see the states/time figure at
\* the bottom of this preamble. The previous sizing (3 domains, 2 topics,
\* MaxHeight=6, InitialNefPool=100) blew up combinatorially: per-entry
\* diversity (owner x registered_at x inactive_from x prefix x topics)
\* is raised to the power of |Domains| because Prefixes == Domains makes
\* the domain set triple as domain ids, owner range, AND prefix range —
\* TLC was still at depth 4 with ~38k distinct states and an exploding
\* queue when the 120s CI budget ran out. The reductions here are
\* semantics-preserving:
\*   - Domains={a,b}: ConfigOK needs >= 2; two domains keep multi-domain
\*     interleavings, owner-vs-non-owner mismatches (both Reject* actions
\*     fire with attempted_owner /= owner), and a 2-element prefix range
\*     so Update still refreshes prefix to a genuinely different value.
\*   - Topics={t1}: topics are inert payload (the lifecycle invariants
\*     are uniform in topic shape, per the spec header); the two subsets
\*     {} / {t1} still let Update refresh the topic set.
\*
\* Sentinel=1000 is far larger than MaxHeight + DappGrace = 7, so the
\* ConfigOK assumption (`Sentinel > MaxHeight + DappGrace + 1`) is
\* satisfied and the inactive_from horizon stays bounded above by
\* Sentinel for every reachable state.
\*
\* The MaxHeight=4 / DappGrace=3 sizing ensures that after a
\* Deactivate at height=h (which arms inactive_from = h + 3), the
\* post-deactivation-inactive window is reachable for any h <= 1
\* (inactive_from in [3, 4]). Heights h >= 2 leave inactive_from beyond
\* MaxHeight, exercising the "inactive_from > MaxHeight" escape in
\* Prop_PostDeactivationInactive. Both branches are explored.
\*
\* InitialNefPool=2 makes the floor-half drain chain reach its zero
\* terminal within the 2-domain budget (2 -> 1 -> 0), including the
\* odd-value floor case (1 \div 2 = 0) — witnessing
\* Inv_NefPoolNonNegative at the pool's terminal state. (nef_pool is a
\* deterministic function of |first_registered|, so the pool's starting
\* value does not multiply the state space; the old 100 merely bottomed
\* out at 12 after the 3 possible drains and never reached zero.)
\*
\* Register-then-Update-then-Deactivate-then-tick-past-grace,
\* Register-then-non-owner-attempt-then-legitimate-Update,
\* multi-domain interleavings, and double-Deactivate attempts (blocked
\* by the Sentinel guard) are all reachable from this configuration.
\*
\* Measured: this configuration exhausts at 45,989 distinct states
\* (depth 9) in ~31s single-run including the liveness properties —
\* comfortably inside the 120s CI budget.

CONSTANTS
    Domains        = {a, b}
    Topics         = {t1}
    MaxHeight      = 4
    DappGrace      = 3
    Sentinel       = 1000
    InitialNefPool = 2

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_RegisterIdempotent
    Inv_NefPoolNonNegative

PROPERTIES
    Inv_OwnerImmutable
    Inv_RegisteredAtImmutable
    Inv_DeactivationForward
    Inv_NefDrainsOnlyOnce
    Prop_EventualDeactivation
    Prop_PostDeactivationInactive
