\* TLC configuration for DAppRegistry.tla
\* Model: 3 domains, 2 topics, MaxHeight=6, DappGrace=3, Sentinel=1000,
\* InitialNefPool=100.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (Register / Update /
\* RejectUpdateByNonOwner / Deactivate / RejectDeactivateByNonOwner /
\* AdvanceHeight) with realistic interleavings of legitimate and
\* adversarial calls.
\*
\* Sentinel=1000 is far larger than MaxHeight + DappGrace = 9, so the
\* ConfigOK assumption (`Sentinel > MaxHeight + DappGrace + 1`) is
\* satisfied and the inactive_from horizon stays bounded above by
\* Sentinel for every reachable state.
\*
\* The MaxHeight=6 / DappGrace=3 sizing ensures that after a
\* Deactivate at height=h (which arms inactive_from = h + 3), the
\* post-deactivation-inactive window is reachable for any h <= 3
\* (inactive_from in [3, 6]). Heights h >= 4 leave inactive_from beyond
\* MaxHeight, exercising the "inactive_from > MaxHeight" escape in
\* Prop_PostDeactivationInactive. Both branches are explored.
\*
\* InitialNefPool=100 lets the floor-half drain fire several times
\* before reaching zero (100 -> 50 -> 25 -> 12 -> 6 -> 3 -> 1 -> 0).
\* The terminal `0 \div 2 = 0` case is reachable from this
\* configuration, witnessing Inv_NefPoolNonNegative + the terminal
\* branch of Inv_NefDrainsOnlyOnce.
\*
\* Register-then-Update-then-Deactivate-then-tick-past-grace,
\* Register-then-non-owner-attempt-then-legitimate-Update,
\* multi-domain interleavings, and double-Deactivate attempts (blocked
\* by the Sentinel guard) are all reachable from this configuration.

CONSTANTS
    Domains        = {a, b, c}
    Topics         = {t1, t2}
    MaxHeight      = 6
    DappGrace      = 3
    Sentinel       = 1000
    InitialNefPool = 100

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_RegisterIdempotent
    Inv_NefPoolNonNegative

PROPERTIES
    Inv_OwnerImmutable
    Inv_RegisteredAtImmutable
    Inv_DeactivationForward
    Inv_NefDrainsOnlyOnce
    Prop_EventualDeactivation
    Prop_PostDeactivationInactive
