\* TLC configuration for MerklePathVerify.tla (FB44).
\* Model: a 2-leaf universe, 3 candidate proof sibling-lists (one
\* honest 1-sibling list + the empty list + a 2-sibling over-long
\* list), LeafCounts spanning the height-0 / height-1 / odd-padding
\* / S-040-alias cases; MaxIndex=2; MaxVerifies=5.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every disjunct of the recompute-and-compare decision:
\* in-range vs out-of-range (T-MV5), exact-length vs truncated vs
\* over-long proof (T-MV3), parity-directed left/right pairing
\* (T-MV4), domain-separated leaf-vs-inner root (T-MV2), and the
\* accept-iff-honest characterization (T-MV1).
\*
\* SHA-256 is the injective-term abstraction inside the .tla; the .cfg
\* supplies only the FINITE input universe. The siblings inside each
\* Proofs element are themselves TERMS — modeled as opaque LeafTerm /
\* InnerTerm constructors over the same Leaves universe so the honest
\* recompute is well-defined.
\*
\* Leaves — two opaque leaf identifiers (proxies for (key, value_hash)
\*   pairs). A 2-leaf tree has WalkHeight 1 (one sibling); the single-
\*   leaf case (LeafCount 1) has WalkHeight 0 (empty proof).
\*
\* Proofs — three candidate sibling sequences:
\*   p_empty : << >>                    — the height-0 proof (LeafCount 1)
\*                                        OR a TRUNCATED proof for a taller
\*                                        tree (T-MV3 reject witness).
\*   p_one   : << <<"L", lb>> >>        — a single sibling = LeafTerm(lb);
\*                                        the honest 1-sibling proof for a
\*                                        2-leaf tree at index 0 with leaf la.
\*   p_two   : << <<"L", lb>>, <<"L", la>> >>
\*                                      — a 2-sibling OVER-LONG proof; for a
\*                                        2-leaf tree (WalkHeight 1) this trips
\*                                        the exact-length gate (T-MV3 reject).
\*
\* LeafCounts — {1, 2, 3, 5, 8}:
\*   1 -> WalkHeight 0 (single-leaf; empty proof).
\*   2 -> WalkHeight 1 (the honest 2-leaf case; p_one accepts at idx 0/1).
\*   3 -> WalkHeight 2 (odd-leaf duplicate-last padding path).
\*   5 -> WalkHeight 3 ) the S-040 alias pair: both 5 and 8 yield
\*   8 -> WalkHeight 3 ) WalkHeight 3, so a proof valid for one is
\*                       structurally valid for the other at a shared-
\*                       parity index (NOT_INV_LeafCountBound witness).
\*
\* MaxIndex=2 lets idx range 0..2 — enough to exercise both parities
\* (even idx 0/2 -> leaf-left; odd idx 1 -> leaf-right) and the
\* out-of-range gate (idx 2 vs LeafCount 2 -> idx >= n -> reject; T-MV5).
\*
\* MaxVerifies=5 is enough to reach every outcome class within a single
\* trace (honest-accept, truncated-reject, over-long-reject,
\* out-of-range-reject, wrong-root-reject) and, when the S-040 pair is
\* present, to log two records sharing (leaf, idx, sibs, root) with
\* distinct n.

CONSTANTS
    Leaves     = {la, lb}
    Proofs     = {p_empty, p_one, p_two}
    LeafCounts = {1, 2, 3, 5, 8}
    MaxIndex   = 2
    MaxVerifies = 5

    \* The three concrete proof sibling-sequences (each element a TERM):
    \*   p_empty = << >>
    \*   p_one   = << <<"L", lb>> >>
    \*   p_two   = << <<"L", lb>>, <<"L", la>> >>
    \* are pinned by the model values above; TLC resolves them via the
    \* LeafTerm constructor in the .tla. (Defined as model-value tuples;
    \* if your TLC build requires explicit sequence literals, expand
    \* p_one / p_two inline in a local override.)

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_RecomputeSound
    INV_DomainSeparation
    INV_ExactLength
    INV_RangeGate
    INV_AcceptIffHonest
    \* PROP_Determinism is a state predicate (holds at every reachable
    \* state), so TLC checks it as an invariant.
    PROP_Determinism

PROPERTIES
    PROP_EventualAnswer

\* To EXHIBIT the S-040 leaf_count caller-trust weakness (T-MV7), add
\* NOT_INV_LeafCountBound to the INVARIANTS block above with LeafCounts
\* including the {5, 8} alias pair. TLC is EXPECTED to report a
\* violation with a two-record trace sharing (leaf, idx, sibs, root)
\* but differing in n — the SECURITY.md §S-040 counterexample. This is
\* a DELIBERATE non-invariant: it documents the boundary of
\* merkle_verify's guarantee, not a regression.
