\* TLC configuration for MerklePathVerify.tla (FB44).
\* Model: a 2-leaf universe, 3 candidate proof sibling-lists (one
\* honest 1-sibling list + the empty list + a 2-sibling over-long
\* list), LeafCounts spanning the height-0 / height-1 / odd-padding
\* / S-040-fix-confirmation cases; MaxIndex=1; MaxVerifies=2.
\*
\* S-040 is CLOSED. The committed root is the root-wrapper hash
\* SHA256(0x02 || be_u32(leaf_count) || inner_root), so leaf_count is
\* bound into the root. The former {5, 8} alias no longer holds: 5 and
\* 8 yield the same INNER walk shape but DIFFERENT committed roots, so
\* the leaf_count-drift case now REJECTS. INV_LeafCountBound is a true
\* invariant (was the modeled non-invariant NOT_INV_LeafCountBound
\* pre-fix).
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every disjunct of the recompute-and-compare decision:
\* in-range vs out-of-range (T-MV5), exact-length vs truncated vs
\* over-long proof (T-MV3), parity-directed left/right pairing
\* (T-MV4), domain-separated leaf-vs-inner root (T-MV2), and the
\* accept-iff-honest characterization (T-MV1).
\*
\* SHA-256 is the injective-term abstraction inside the .tla; the .cfg
\* supplies only the FINITE input universe. The siblings inside each
\* Proofs element are themselves TERMS — modeled as opaque LeafTerm /
\* InnerTerm constructors over the same Leaves universe so the honest
\* recompute is well-defined.
\*
\* Leaves — two opaque leaf identifiers (proxies for (key, value_hash)
\*   pairs). A 2-leaf tree has WalkHeight 1 (one sibling); the single-
\*   leaf case (LeafCount 1) has WalkHeight 0 (empty proof).
\*
\* Proofs — three candidate sibling sequences:
\*   p_empty : << >>                    — the height-0 proof (LeafCount 1)
\*                                        OR a TRUNCATED proof for a taller
\*                                        tree (T-MV3 reject witness).
\*   p_one   : << <<"L", lb>> >>        — a single sibling = LeafTerm(lb);
\*                                        the honest 1-sibling proof for a
\*                                        2-leaf tree at index 0 with leaf la.
\*   p_two   : << <<"L", lb>>, <<"L", la>> >>
\*                                      — a 2-sibling OVER-LONG proof; for a
\*                                        2-leaf tree (WalkHeight 1) this trips
\*                                        the exact-length gate (T-MV3 reject).
\*
\* LeafCounts — {1, 2, 3, 5, 8}:
\*   1 -> WalkHeight 0 (single-leaf; empty proof).
\*   2 -> WalkHeight 1 (the honest 2-leaf case; p_one accepts at idx 0/1).
\*   3 -> WalkHeight 2 (odd-leaf duplicate-last padding path).
\*   5 -> WalkHeight 3 ) the S-040 fix-confirmation pair: 5 and 8 yield
\*   8 -> WalkHeight 3 ) the same WalkHeight 3 INNER walk, so the inner
\*                       root recomputes identically — BUT the
\*                       root-wrapper now folds in the distinct
\*                       leaf_count, so RootTerm(5, inner) /=
\*                       RootTerm(8, inner). The committed roots differ,
\*                       so a proof valid for one is REJECTED against the
\*                       other's root (INV_LeafCountBound witness — the
\*                       former alias is closed by S-040).
\*
\* MaxIndex=1 lets idx range 0..1 — enough to exercise both parities
\* (even idx 0 -> leaf-left; odd idx 1 -> leaf-right) and the
\* out-of-range gate (idx 1 vs LeafCount 1 -> idx >= n -> reject; T-MV5).
\* (Was 2: idx 2 added no invariant-visible case — parity is covered by
\* 0/1 and out-of-range by idx 1 vs n=1 — while tripling the idx leg of
\* the input cross-product; shrunk for TLC tractability.)
\*
\* MaxVerifies=2 bounds verify_log at the pairwise-invariant depth.
\* Records are independent (MakeRecord is a pure function of its input;
\* no cross-record state evolves) and every invariant reads single
\* records or PAIRS of records (PROP_Determinism, INV_LeafCountBound),
\* so depth 1 already reaches every outcome class (honest-accept,
\* truncated-reject, over-long-reject, out-of-range-reject,
\* wrong-root-reject, leaf_count-drift-reject) and depth 2 reaches every
\* ordered PAIR of records — including the {5, 8} drift pair, confirming
\* NO two accepted records share (leaf, idx, sibs, root) with distinct n
\* (INV_LeafCountBound holds because the root-wrapper binds n into the
\* committed root). Longer logs multiply states (~720^k for the 720-input
\* universe) without adding checking power — the same rationale as
\* CompositeKeyStateProof's MaxRequests bound. (Was 5: ~720^5 ~ 2e14
\* states, TLC timeout.)
\*
\* Measured sizing (tla2tools, 1 worker, invariants only): 519,121
\* distinct states = 1 + 720 + 720^2 input pairs, depth 3, ~50s —
\* inside the CI 120s budget.

CONSTANTS
    Leaves     = {la, lb}
    LeafCounts = {1, 2, 3, 5, 8}
    MaxIndex   = 1
    MaxVerifies = 2

    \* The three concrete proof sibling-sequences (each element a TERM)
    \* are wired in via CONSTANT substitution so `sibs[pi]` (function
    \* application in the recompute walk) sees genuine SEQUENCES, not
    \* opaque model values. The operators live in the .tla:
    \*   ProofEmpty = << >>
    \*   ProofOne   = << <<"L", LeafA>> >>
    \*   ProofTwo   = << <<"L", LeafA>>, <<"L", LeafB>> >>
    \* Substituting ProofsUniverse yields Proofs = {ProofEmpty, ProofOne,
    \* ProofTwo} — three genuine sequences of sibling TERMS.

CONSTANT Proofs <- ProofsUniverse

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_RecomputeSound
    INV_DomainSeparation
    INV_ExactLength
    INV_RangeGate
    INV_AcceptIffHonest
    \* INV_LeafCountBound (T-MV7) is now a TRUE invariant (S-040 CLOSED):
    \* the root-wrapper binds leaf_count into the committed root, so no
    \* two accepted records may share (leaf, idx, sibs, root) yet differ
    \* in n. With the {5, 8} pair in LeafCounts, TLC confirms it HOLDS.
    INV_LeafCountBound
    \* PROP_Determinism is a state predicate (holds at every reachable
    \* state), so TLC checks it as an invariant.
    PROP_Determinism

\* The liveness property the module defines (PROP_EventualAnswer) is NOT
\* checked here: temporal checking makes TLC record the full behavior
\* graph, a ~25x slowdown that blows the CI budget at this state count
\* (the invariant-only run exhausts 519,121 states in ~50s; with a
\* PROPERTIES block the same space runs >20min). The property is the
\* trivial fairness-forced-progress claim (Verify eventually fires until
\* saturation); the load-bearing FB44 content is the seven SAFETY
\* theorems, fully covered by the INVARIANTS above. Same posture as
\* BFTAcceptGate.cfg's unchecked liveness pair.

\* T-MV7 / INV_LeafCountBound is the S-040 closure. Pre-fix this was the
\* DELIBERATE non-invariant NOT_INV_LeafCountBound, expected to FAIL with
\* a two-record trace sharing (leaf, idx, sibs, root) but differing in n.
\* The shipped root-wrapper hash SHA256(0x02 || be_u32(leaf_count) ||
\* inner_root) now binds leaf_count into the committed root, so 5 and 8
\* no longer alias (their committed roots differ) and the invariant
\* HOLDS. It is asserted directly in the INVARIANTS block above.
