\* TLC configuration for TcpKeepaliveReap.tla (FB39).
\* Model: Peers = {p1, p2}, KeepaliveInterval = 2, KeepaliveProbes = 3,
\*        MaxTime = 12.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (PeerConnect / PeerDie /
\* KeepaliveProbe / ReapDeadPeer / AdvanceTime) with realistic
\* interleavings of attach, die, probe-or-no-probe, and reap-on-
\* timeout cycles.
\*
\* Peers = {p1, p2} gives 2 distinct peer identifiers:
\*   - p1 and p2 exercise the multi-peer interleavings; each peer
\*     has its own (peer_alive, last_keepalive_response) tuple so
\*     the per-peer independence of the lifetime invariant is
\*     witnessed (PeerDie on p1 does not affect p2's reap timing).
\*   - With |Peers| = 2, the total reachable state space for the
\*     peer_present subset is 2^2 = 4; combined with the per-peer
\*     alive/dead flag (2^2 = 4) and last_keepalive_response (12+1)^2
\*     = 169 per-peer-time-axis combinations, the joint state
\*     surface stays bounded for TLC exhaustion in under 30s.
\*
\* KeepaliveInterval = 2 + KeepaliveProbes = 3 gives KeepaliveCycle
\* = 2 × 3 = 6 spec-time units before the kernel-timeout predicate
\* fires:
\*   - Small enough to exhaust the reap branch reachably within
\*     MaxTime = 12 (a peer that dies at t=0 will be reaped by t=7
\*     under fairness on KeepaliveProbe + ReapDeadPeer).
\*   - Large enough to exercise the gap-widening dynamics non-
\*     trivially: a dead peer at t=0 has last_keepalive_response =
\*     0; the gap widens via AdvanceTime steps; at t=7 the predicate
\*     `now - last_keepalive_response > 6` fires and ReapDeadPeer
\*     is enabled.
\*   - The ratio KeepaliveInterval × KeepaliveProbes = 6 :: MaxTime
\*     = 12 is 1:2 — two full reap-cycles fit within the horizon,
\*     so the reap-then-reconnect interleaving is reachable.
\*
\* MaxTime = 12 bounds the trace length so TLC exhausts. The bound
\* exercises:
\*   - PeerConnect(p1) at t=0 — peer_present grows to {p1};
\*     peer_alive[p1] = TRUE; last_keepalive_response[p1] = 0.
\*   - PeerConnect(p2) at t=0 — peer_present grows to {p1, p2};
\*     parallel attach exercises the per-peer independence.
\*   - PeerDie(p1) at t=2 — peer_alive[p1] = FALSE; peer_present
\*     unchanged.
\*   - KeepaliveProbe(p2) at t=3 — peer_alive[p2] = TRUE branch;
\*     last_keepalive_response[p2] = 3.
\*   - KeepaliveProbe(p1) at t=5 — peer_alive[p1] = FALSE branch;
\*     last_keepalive_response[p1] UNCHANGED (still 0); gap is
\*     now 5 > 6 is FALSE, so ReapDeadPeer not yet enabled.
\*   - AdvanceTime sequence to t=7 — gap for p1 becomes 7 > 6 is
\*     TRUE; ReapDeadPeer(p1) is enabled; under fairness it fires;
\*     peer_present shrinks to {p2}.
\*   - PeerConnect(p1) at t=8 — peer_present grows to {p1, p2}
\*     again; peer_alive[p1] = TRUE; last_keepalive_response[p1]
\*     = 8 (fresh start; INV_ReapMonotone witnessed).
\*   - AdvanceTime sequence to t=12 — SaturateClock pins state.
\*
\* The model exercises:
\*   - INV_BoundedDeadPeerLifetime: any dead peer in peer_present
\*     with staleness gap > KeepaliveCycle = 6 has ReapDeadPeer
\*     ENABLED (immediately reapable; fairness fires the reap).
\*   - INV_NoFalseReap: ReapDeadPeer is never ENABLED on a live
\*     peer (its peer_alive[p] = FALSE precondition models the
\*     kernel erroring only after unanswered probes).
\*   - INV_MonotoneTime: `now` never decreases.
\*   - INV_ReapMonotone: peer_present is monotone except for
\*     ReapDeadPeer removals + PeerConnect additions.
\*   - PROP_EventualReap: every dead peer eventually leaves
\*     peer_present (under fairness on ReapDeadPeer + AdvanceTime).
\*   - PROP_NoLeak: peer_present \subseteq Peers always.

CONSTANTS
    Peers             = {p1, p2}
    KeepaliveInterval = 2
    KeepaliveProbes   = 3
    MaxTime           = 12

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_BoundedDeadPeerLifetime
    INV_NoFalseReap
    INV_MonotoneTime
    INV_ReapMonotone

PROPERTIES
    PROP_EventualReap
    PROP_NoLeak
