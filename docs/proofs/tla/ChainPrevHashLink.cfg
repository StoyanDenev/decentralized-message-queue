\* TLC configuration for ChainPrevHashLink.tla
\* Model: 2 nodes, MaxChainLength=2, BodyHashes={bh1, bh2, bh3}.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (ProduceBlock / ApplyBlock /
\* TamperHistorical / ReloadChain) with realistic interleavings of
\* legitimate production, cross-node gossip, adversarial tampering,
\* and load-time reload.
\*
\* Measured sizing (tla2tools v1.8.0): 36,469 distinct states, depth 12,
\* ~26s single-worker. MaxChainLength=3 blew the CI 120s budget (>91k
\* distinct at BFS depth 8 with the queue still growing and the 7-branch
\* liveness re-check compounding); shrunk to 2 on 2026-07-02 — every
\* scenario below survives the shrink.
\*
\* MaxChainLength=2 is enough for:
\*   - ProduceBlock at h=0 + ApplyBlock + ProduceBlock at h=1 +
\*     ApplyBlock (chain reaches genesis + 2 blocks;
\*     INV_PrevHashLinkValid + INV_AppendOnly exercised on two
\*     legitimate extensions)
\*   - TamperHistorical at the middle block (i=2, which has a
\*     successor at i=3) + ReloadChain witnesses
\*     INV_HistoricalTamperCascades +
\*     PROP_TamperEventuallyDetected
\*   - Two nodes' chains can diverge via different sampled body_hash
\*     values, witnessing the per-node independence of invariants.
\*   - Wrong-link reject paths exercised: ApplyBlock with a stale
\*     pending_inbox head after the chain has advanced past it
\*     (head_hash no longer matches) — captures
\*     INV_WrongPrevHashRejected's two-layer defense via the shared
\*     prev_hash_ok predicate. rejected_by = "both" latches the
\*     two-layer gate outcome.
\*
\* BodyHashes={bh1, bh2, bh3} gives 3 distinct opaque body-hash
\* values. Three is the minimum to exercise:
\*   - Genesis's body_hash (a CHOOSE from BodyHashes; deterministic
\*     under TLC)
\*   - TamperHistorical needs a value different from the current
\*     body_hash to swap to (>=2 BodyHashes required by ConfigOK)
\*   - The third value lets the state space include "produce a fresh
\*     block then tamper it to another value" interleavings without
\*     being forced to swap back to genesis's value.
\*
\* Nodes={n1, n2} gives a non-trivial 2-node cross-gossip interleaving:
\* ProduceBlock at one node + ApplyBlock at the other exercises the
\* pending_inbox gossip queue; TamperHistorical at one node +
\* ReloadChain at the same node + simultaneous honest production at
\* the other witnesses the per-node independence of tampered_at and
\* load_throws.

CONSTANTS
    Nodes              = {n1, n2}
    MaxChainLength     = 2
    BodyHashes         = {bh1, bh2, bh3}

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_PrevHashLinkValid
    INV_GenesisPrevHashZero
    INV_WrongPrevHashRejected
    INV_ReloadPreservesLinks
    INV_HistoricalTamperCascades
    INV_AppendOnly

PROPERTIES
    PROP_EventualBlockProduction
    PROP_TamperEventuallyDetected
