\* TLC configuration for MergeEventAcceptGate.tla
\* Model: ShardCount = 3, Grace = 2, Threshold = 3, ExtendedMode = TRUE,
\*        MaxBlock = 3.
\*
\* This config DELIBERATELY uses ShardCount = 3 so the partner-pairing
\* wrap is non-trivial and both the ADMIT and the REJECT paths of the
\* apply-side gate (A2) are reachable:
\*   ExpectedPartner(0) = 1, ExpectedPartner(1) = 2, ExpectedPartner(2) = 0
\* so the wrap (shard 2 -> partner 0) is exercised, AND a non-adjacent
\* candidate pair (e.g. shard 0 -> partner 2) is reachably REJECTED by
\* PartnerGateOK. With ShardCount = 2 the only valid partner of each
\* shard is the other shard, so the non-adjacent rejection path would
\* be unreachable; ShardCount = 3 is the smallest count that exercises
\* it. The result:
\*   - INV_PartnerAdjacency holds (no non-adjacent pair ever lands in
\*     merge_state because A2 rejected it).
\*   - INV_NoLeakAdmission holds (every entry has a matching admitted
\*     BEGIN ghost record).
\*   - INV_EndMatchedErase holds (a cross-pair END never mutated
\*     merge_state, so end_admits carries only matched-partner records).
\*
\* Grace = 2 matches a small non-default merge_grace_blocks; with
\* MaxBlock = 3 the effective_height domain 0..(MaxBlock+Grace) = 0..5
\* spans both TOO-SOON values (eff_h < block_height + 2) and ADMISSIBLE
\* values, so INV_GraceDiscipline is exercised on both sides of V5.
\*
\* Threshold = 3 (merge_threshold_blocks) with ev_start \in 0..MaxBlock
\* makes the BEGIN window-causality split reachable on both sides of V6:
\* a window that extends past the head (ev_start + 3 > block_height) is
\* REJECTED, a window entirely in committed history is ADMITTED. The
\* S-036 leading bound (ev_start <= block_height) rejects future-start
\* windows before the sum-check, exactly as the C++ ordering does.
\* INV_WindowCausality pins both halves over the admit history.
\*
\* ExtendedMode = TRUE exercises the full gate; the WrongMode action is
\* disabled under this config (it is enabled only when ExtendedMode is
\* FALSE). To exercise the V1-blocks-everything path, run a SECOND
\* config with ExtendedMode = FALSE — every SubmitBegin / SubmitEnd is
\* then disabled (CommonGateOK / EndGateOK fail on V1), WrongMode
\* becomes the only non-AdvanceBlock action, and merge_state stays
\* empty for all reachable states (INV_NoLeakAdmission holds trivially).
\*
\* MaxBlock = 3 is a TLC-tractability bound (the ghost admit-history
\* sets form a subset lattice over the admissible <<shard, partner,
\* eff_h, ev_start, height>> records: MaxBlock = 5 admits 10 such
\* combos per shard -> a ~2^30 lattice, TLC > 300s; MaxBlock = 4 still
\* 12 records -> ~10^6 states; MaxBlock = 3 collapses the admit to the
\* single combo <<s, s+1 mod 3, 5, 0, 3>> per shard while every
\* documented reject/admit scenario above stays reachable). Measured:
\* 356 states generated, 67 distinct, depth 13, ~2s (tla2tools v1.8.0).

CONSTANTS
    ShardCount   = 3
    Grace        = 2
    Threshold    = 3
    ExtendedMode = TRUE
    MaxBlock     = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_PartnerAdjacency
    INV_NoLeakAdmission
    INV_GraceDiscipline
    INV_WindowCausality
    INV_EndMatchedErase

\* PROPERTIES intentionally omitted: this config checks SAFETY only.
\* The accept-gate contract is a safety property (no adversarial
\* MERGE_EVENT ever mutates merge_state, and every active entry is a
\* well-formed +1-adjacent pair admitted under the grace + window
\* discipline), fully covered by the INVARIANTS above. Forward-progress
\* of the merge mechanism (an under-quorum region eventually receives a
\* merge) is FB35 RegionalShardingCommittee.tla's PROP_UnderQuorumMerge;
\* see also proofs/UnderQuorumMerge.md for the analytic R7 narrative.
