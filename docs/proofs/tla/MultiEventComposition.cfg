\* TLC configuration for MultiEventComposition.tla
\* Model: 2 domains {a, b}, MaxAmount = 1, MaxStake = 5,
\* MaxHeight = 2, Hashes = {h1}, Shards = {s1, s2}.
\*
\* Measured sizing (tla2tools v1.8.0): 126,413 states generated,
\* 63,348 distinct, depth 5, ~50s single-worker — inside the 120s CI
\* budget while still exercising every sub-event class composed into
\* the canonical apply pipeline. (The prior 3-domain / MaxAmount=2 /
\* 2-hash sizing put the ConstructBlock successor enumeration at
\* 2^27 x 2^36 candidate subset combinations — hopelessly past any
\* CI budget.)
\*
\* Domains = {a, b} gives two regular addresses (the ConfigOK
\* minimum); ConstructBlock can admit transfers, aborts,
\* equivocations, and receipts touching either of them. The 2-domain
\* size keeps the cardinality of the bounded PendingBlock
\* construction small.
\*
\* MaxAmount = 1 caps individual transfer + receipt amounts. With
\* per-domain initial balance = MaxAmount = 1, every domain has
\* exactly enough headroom for a single transfer or one receipt
\* credit per block. The constrained headroom forces the spec to
\* exercise the "insufficient-balance silent skip" branch (drain a
\* domain in block 1, attempt a further debit in block 2 — FB10
\* territory; FB20 inherits via the transfer_delta CHOOSE
\* arithmetic).
\*
\* MaxStake = 5 caps per-domain stake. Combined with the abort_slash
\* CHOOSE bounded by stakes[d], the spec exercises:
\*   - Phase-1 abort with positive stakes -> partial slash
\*   - Phase-1 abort with zero stakes -> domain-inclusion no-op
\*   - Equivocation post-Phase-1 -> full forfeiture of remaining
\*
\* MaxHeight = 2 caps the apply-action count (ConstructBlock and
\* AdvanceHeight are both gated on height < MaxHeight). With
\* ConstructBlock + ApplyBlock paired at the block level, MaxHeight
\* = 2 gives the model 2 admit + 2 apply cycles plus stutter steps.
\* The composition-spec's headline contract (T-MC3 deterministic
\* order) is observable in even a single ConstructBlock + ApplyBlock
\* pair; MaxHeight = 2 is the minimum that also exercises the
\* CROSS-BLOCK scenarios (duplicate-receipt dedup, zero-stake abort
\* after a block-1 equivocation, insufficient-balance skip after a
\* block-1 drain, slash accumulation).
\*
\* Hashes = {h1} + Shards = {s1, s2} witness the Inv_DedupKeyIsPair
\* claim from FB14 — a single tx_hash from two different src_shards
\* is two distinct dedup keys; the spec's applied_receipts set
\* membership treats them as distinct. The tx_hash payload set is
\* inert beyond that pairing, so it stays a singleton.
\*
\* Coverage matrix:
\*   - ConstructBlock with empty sub-event sets -> ApplyBlock
\*     stutters (no balance / stake / receipt mutation)
\*   - ConstructBlock with one transfer -> apply branch debits +
\*     credits + advances pending_block back to NoPendingBlock
\*   - ConstructBlock with one Phase-1 abort -> apply branch slashes
\*     stakes[d] partially + advances accumulated_slashed
\*   - ConstructBlock with one Phase-2 abort -> apply branch no-ops
\*     on slash (matches FB16 Phase-2 no-slash invariant)
\*   - ConstructBlock with one equiv -> apply branch zeroes stakes[d]
\*     (matches FB15 full-forfeiture)
\*   - ConstructBlock with one fresh receipt -> apply credits
\*     balances[to] + inserts dedup key
\*   - ConstructBlock with one duplicate receipt -> apply silently
\*     skips (matches FB14 dedup-gate)
\*   - ConstructBlock with all four sub-event classes -> apply
\*     composes them in canonical order; T-MC2 A1 conservation
\*     verified across the composed step
\*
\* Interleavings TLC explores:
\*   - ConstructBlock(ts, abs, eqs, rs) variants: SUBSET-typed,
\*     bounded to <= 1 event per class (a block may still carry all
\*     FOUR classes at once — the FB20 composition claim is ACROSS
\*     classes; multi-event-per-class ordering is the per-surface
\*     specs' territory, e.g. FB5 models multi-transfer blocks)
\*   - Apply-order: fixed (transfers -> aborts -> equivs -> receipts)
\*     so the canonical-pipeline contract IS the determinism witness
\*   - Multi-block traces: 2 ConstructBlock + ApplyBlock cycles
\*     explore the cross-block dedup persistence + slash accumulation
\*
\* Inv_PerEventInvariantsCompose is the structural witness against
\* the composition-breaking-an-isolated-spec-invariant concern: the
\* invariant is verified across every reachable state of every
\* ConstructBlock + ApplyBlock interleaving.
\*
\* Inv_A1Conservation tracks the slash + stake rebooking conservation:
\* SumStakes + accumulated_slashed <= |Domains| * MaxStake = 10.

CONSTANTS
    Domains    = {a, b}
    MaxAmount  = 1
    MaxStake   = 5
    MaxHeight  = 2
    Hashes     = {h1}
    Shards     = {s1, s2}

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_A1Conservation
    Inv_PerEventInvariantsCompose
    Inv_AppliedReceiptsMonotonic
    Inv_SlashedMonotonic
    Inv_OutboundMonotonic

PROPERTIES
    Prop_EventualApply
