\* TLC configuration for DAppRegistryLifecycleSM.tla (FB42)
\* Model: 2 domains {d1, d2}, 2 owners {o1, o2}, 2 pubkeys {k1, k2},
\* 2 payloads {p1, p2}, MaxHeight=5, DAPP_GRACE_BLOCKS=2, NONE=1000.
\*
\* The 2-domain Cardinality is sufficient for every lifecycle-
\* transition invariant: INV_OwnerImmutable + INV_NoForge are
\* observable on a single domain; the second domain is included for
\* the cross-domain "register one, don't touch the other" coverage
\* and to exercise the per-domain independence implicit in the
\* registry function shape.
\*
\* The 2-owner cardinality is sufficient for the RejectRegisterBy
\* NonOwner + RejectDeregisterByNonOwner action coverage: one owner
\* legitimately holds the domain; the other owner is the adversary
\* attempting cross-owner mutation.
\*
\* MaxHeight=5 + DAPP_GRACE_BLOCKS=2 gives the model windows like:
\*   t=0: RegisterFirst(d1, o1, k1)   → state=ACTIVE; total_calls=0
\*   t=0: Call(d1, ..., p1)            → total_calls=1; state stays ACTIVE
\*   t=1: AdvanceHeight to 1
\*   t=1: RegisterUpdate(d1, o1, k2)   → service_pubkey=k2; owner_anon preserved
\*   t=1: RejectRegisterByNonOwner(d1, o2, k1) → stutter; owner_anon preserved
\*   t=2: AdvanceHeight to 2
\*   t=2: Deregister(d1, o1)           → state=DEREGISTERED; deactivation_height=4
\*   t=2: Call(d1, ..., p1)            → REJECTED (state=DEREGISTERED)
\*   t=3: AdvanceHeight to 3            → pre-deactivation window
\*   t=4: AdvanceHeight to 4
\*   t=4: Deactivate(d1)                → state=DEACTIVATED
\*   t=4: Call(d1, ..., p1)             → REJECTED (state=DEACTIVATED;
\*                                          PROP_PostDeactivationNoCalls verified)
\*   t=5: AdvanceHeight to 5            → MaxHeight bound reached;
\*                                          PROP_EventualDeactivation
\*                                          bounded-model escape fires
\*
\* PROP_EventualDeactivation + PROP_PostDeactivationNoCalls are checked
\* under WF on AdvanceHeight + Deactivate. The MaxHeight=5 escape
\* clause covers the case where the deactivation_height arming would
\* push beyond the model bound (e.g., Deregister at height 4 →
\* deactivation_height = 6 > MaxHeight; the temporal property's
\* bounded-model escape fires).
\*
\* NONE=1000 is far larger than MaxHeight + DAPP_GRACE_BLOCKS + 1 = 8,
\* satisfying ConfigOK; the deactivation_height field stays bounded
\* above by NONE for every reachable state.
\*
\* Coverage matrix:
\*   - RegisterFirst(d, owner, pk): NONE → ACTIVE; sets registered_at
\*   - RegisterUpdate(d, owner, pk): ACTIVE → ACTIVE; preserves owner_anon
\*   - RejectRegisterByNonOwner(d, owner, pk): cross-owner stutter
\*   - Deregister(d, owner): ACTIVE → DEREGISTERED; arms deactivation_height
\*   - RejectDeregisterByNonOwner(d, owner): cross-owner stutter
\*   - Call(d, caller, payload): ACTIVE-only increment of total_calls
\*   - Deactivate(d): DEREGISTERED → DEACTIVATED (auto-trigger)
\*   - AdvanceHeight: temporal driver to deactivation window
\*
\* Expected state-space magnitude: ~10⁴ states; < 30s wall-clock on
\* a single TLC core. The bounded MaxHeight=5 ceiling caps the
\* temporal interleaving search; the per-action-disjunct enumeration
\* gives ~8 actions × per-height-step branching factor.

CONSTANTS
    Domains            = {d1, d2}
    Owners             = {o1, o2}
    PubKeys            = {k1, k2}
    Payloads           = {p1, p2}
    MaxHeight          = 5
    DAPP_GRACE_BLOCKS  = 2
    NONE               = 1000

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_NoForge

PROPERTIES
    INV_OwnerImmutable
    INV_StateProgression
    INV_GraceBlocks
    INV_CallsRequireActive
    INV_TotalCallsMonotonic
    PROP_EventualDeactivation
    PROP_PostDeactivationNoCalls
