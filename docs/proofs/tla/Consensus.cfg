\* TLC configuration for Consensus.tla
\* Model: K=3 committee, 1 Byzantine, MaxRounds=4, BFT escalation at round 3.

CONSTANTS
    Validators = {v1, v2, v3}
    K          = 3
    Byzantine  = {v3}
    MaxRounds  = 4
    BFTThreshold = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    Inv_OneDigest
    Inv_NoEarlyReveal
    Inv_HonestNoEquivocate

PROPERTIES
    Prop_Termination
