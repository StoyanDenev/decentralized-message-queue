\* TLC configuration for SnapshotIntegrity.tla
\* Model: 2 nodes, MaxHeight=3, Slots={sl1, sl2}.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes
\* while still exercising every action disjunct (ProduceBlock /
\* SerializeSnapshot / RestoreFromSnapshot / ApplyBlockAfterRestore /
\* TamperSnapshot / TamperLiveState) with realistic interleavings of
\* legitimate production at one node, snapshot emission, cross-node
\* restore, post-restore apply, and the four adversary surfaces
\* (chain-tamper / state-tamper / dapp_registry-tamper / live-state
\* tamper).
\*
\* MaxHeight=3 is enough for:
\*   - ProduceBlock at h=0 + h=1 + h=2 (producer's chain grows to
\*     three blocks; INV_ProducerSelfApplyConsistentPostS038 +
\*     state_root accumulation are exercised across the chain)
\*   - SerializeSnapshot at any height + RestoreFromSnapshot at the
\*     other node witnesses INV_SnapshotRoundTripPreservesAllNamespaces
\*     + INV_DAppRegistryRoundtrips + INV_RestoreDeterminism
\*   - TamperSnapshot's three disjuncts (chain / state / dapp_registry)
\*     followed by RestoreFromSnapshot witnesses
\*     INV_StateRootGateFiresOnRestoreTamper +
\*     PROP_TamperingDetected on each tamper site separately
\*   - ApplyBlockAfterRestore on a restored chain witnesses the
\*     apply-time S-033 gate firing on divergent state_roots —
\*     INV_NoSilentDivergence's cross-node form
\*
\* Slots={sl1, sl2} gives 2 distinct opaque state-slot values.
\* Two is the minimum to exercise:
\*   - A namespace can hold {}, {sl1}, {sl2}, or {sl1, sl2} —
\*     four distinct contents per namespace
\*   - TamperSnapshot needs a value different from the current
\*     namespace contents to swap to (>=2 Slots required to ever
\*     enable a tamper disjunct)
\*   - Block.txs ranges over SUBSET Slots — four distinct payloads
\*     per block let TLC explore multi-payload accumulation across
\*     three blocks
\*
\* Nodes={n1, n2} gives the minimum 2-node cross-restore scenario.
\* The cross-node restore is the load-bearing surface for
\* INV_SnapshotRoundTripPreservesAllNamespaces +
\* INV_DAppRegistryRoundtrips + INV_RestoreDeterminism —
\* RestoreFromSnapshot requires n /= n2, so two nodes are the
\* minimum. Two also enables INV_NoSilentDivergence which quantifies
\* over pairs of distinct nodes.

CONSTANTS
    Nodes      = {n1, n2}
    MaxHeight  = 3
    Slots      = {sl1, sl2}

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_SnapshotRoundTripPreservesAllNamespaces
    INV_StateRootGateFiresOnRestoreTamper
    INV_ProducerSelfApplyConsistentPostS038
    INV_DAppRegistryRoundtrips
    INV_RestoreDeterminism
    INV_NoSilentDivergence

PROPERTIES
    PROP_EventualSnapshotSuccess
    PROP_TamperingDetected
