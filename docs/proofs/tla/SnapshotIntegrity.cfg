\* TLC configuration for SnapshotIntegrity.tla (redesigned 2026-07-02).
\* Model: 2 nodes, MaxHeight=2, Slots={sl1}.
\*
\* MaxHeight=2 lets a producer grow a multi-block chain (replay
\* accumulation across two blocks for
\* INV_ProducerSelfApplyConsistentPostS038), then publish / restore
\* a height-1 snapshot at the other node / append on top of the
\* restored chain (INV_SnapshotRoundTripPreservesAllNamespaces,
\* INV_RestoreDeterminism, the apply-time gate in AppendBlock's
\* reject branch).
\*
\* Slots={sl1} gives 2 distinct per-namespace contents ({} vs {sl1})
\* — every claim in the spec is an equality/inequality over
\* namespace contents plus abstract-hash injectivity, so all any
\* action or tamper branch needs is ONE different value to swap in,
\* which 2 contents always provide. Every action disjunct and both
\* gate checks stay enabled/exercised.
\*
\* Model-size note: MaxHeight=3 or Slots={sl1,sl2} push the space
\* past 10^6 distinct states (snapshot x provenance x corrupt-
\* lineage cross-products) without enabling any new action pairing
\* or claim; this config exhausts in well under the harness timeout.
\*
\* Nodes={n1, n2} is the minimum for the load-bearing cross-node
\* scenario (one node publishes to the snapshot channel, the other
\* restores) and for the pairwise invariants
\* (INV_RestoreDeterminism, INV_NoSilentDivergence).
\*
\* The adversary surfaces exercised: head-block tamper (caught by
\* gate check 1, the head_hash recompute), accounts/dapp_registry
\* namespace tamper (caught by gate check 2, the state_root
\* recompute — the dapp branch is the S-037 closure surface), and
\* at-rest live-state tamper (latched tampered_live; excluded from
\* the honest-node claims, propagation documented in the module
\* header). Every modeled snapshot tamper is un-installable:
\* INV_StateRootGateFiresOnRestoreTamper.
\*
\* PROP_EventualSnapshotSuccess needs the WF(AppendBlock) +
\* WF(SerializeSnapshot) fairness declared in Spec.

CONSTANTS
    Nodes      = {n1, n2}
    MaxHeight  = 2
    Slots      = {sl1}

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_SnapshotRoundTripPreservesAllNamespaces
    INV_DAppRegistryRoundtrips
    INV_StateRootGateFiresOnRestoreTamper
    INV_ProducerSelfApplyConsistentPostS038
    INV_RestoreDeterminism
    INV_NoSilentDivergence

PROPERTIES
    PROP_EventualSnapshotSuccess
