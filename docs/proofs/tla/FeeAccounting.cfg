\* TLC configuration for FeeAccounting.tla
\* Model: 2 domains, MaxHeight=2, MaxAmount=1, MaxFee=1,
\* TotalSupplyInitial=2.
\*
\* Small enough for TLC to exhaust within the harness timeout while
\* still exercising every action disjunct (SubmitTx / ApplyTx /
\* ApplyTxInsufficientBalance / FinalizeBlockWithCreators /
\* FinalizeBlockEmpty / StartNextBlock) with interleavings of
\* legitimate, insufficient-balance, and empty-committee blocks.
\*
\* TotalSupplyInitial=2 across 2 domains (a, b) means each domain
\* starts with 1 (2 \div 2 = 1). The Init operator's
\* `TotalSupplyInitial \div Cardinality(Domains)` allocation is exact
\* (no remainder), so the A1 conservation invariant holds at Init.
\*
\* MaxAmount=1 + MaxFee=1 keeps the per-tx cost ceiling at 2, one
\* above each domain's initial balance of 1 — low-cost SubmitTx values
\* are applyable, but (amount=1, fee=1) pushes the cost above the
\* sender's balance and triggers the ApplyTxInsufficientBalance
\* disjunct. Both branches are reachable.
\*
\* MaxHeight=2 gives 2 finalization cycles, so the empty-creators
\* carry-forward (FinalizeBlockEmpty preserves block_total_fees) can
\* be followed by a with-creators distribution of the carried pool
\* within the bounded run. Dust is exercised: a single fee=1 tx with
\* creators <<a, b>> gives per_creator=0, dust=1 to creators[1].
\*
\* State-space note: the dominant factor is the pending_txs queue —
\* |Tx| = 2*2*2*2 = 16 values at up to 2 queue slots (SubmitTx's
\* `Len(pending_txs) < 2` bound), 16^2+16+1 = 273 queue
\* configurations, times balances/pool partitions (6), creator
\* sequences (7), and heights (3) — tens of thousands of distinct
\* states, exhaustible by single-worker TLC with liveness checking
\* well inside the harness's default 120s timeout. Larger constants
\* explode combinatorially through the queue term (e.g. the original
\* 4-domain / MaxAmount=3 / MaxFee=2 / 5-slot config had |Tx| = 192,
\* ~2.6e11 queue configurations — unreachable exhaustively).

CONSTANTS
    Domains            = {a, b}
    MaxHeight          = 2
    MaxAmount          = 1
    MaxFee             = 1
    TotalSupplyInitial = 2

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_BalanceNonNegative
    Inv_BlockTotalFeesNonNegative
    Inv_A1Conservation
    Inv_FeeDistributionDeterministic

PROPERTIES
    Inv_NoFeeOnSkip
    Inv_EmptyCreatorsNoDistribute
    Prop_EventualFeeDrain
    Prop_SupplyConservation
