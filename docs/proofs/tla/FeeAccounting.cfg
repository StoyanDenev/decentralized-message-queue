\* TLC configuration for FeeAccounting.tla
\* Model: 4 domains, MaxHeight=4, MaxAmount=3, MaxFee=2,
\* TotalSupplyInitial=20.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (SubmitTx / ApplyTx /
\* ApplyTxInsufficientBalance / FinalizeBlockWithCreators /
\* FinalizeBlockEmpty / StartNextBlock) with realistic interleavings of
\* legitimate, insufficient-balance, and empty-committee blocks.
\*
\* TotalSupplyInitial=20 across 4 domains (a, b, c, d) means each
\* domain starts with 5 (20 \div 4 = 5). The Init operator's
\* `TotalSupplyInitial \div Cardinality(Domains)` allocation is exact
\* (no remainder), so the A1 conservation invariant holds at Init.
\*
\* MaxAmount=3 + MaxFee=2 keeps the per-tx cost ceiling at 5, which
\* matches each domain's initial balance — most SubmitTx values are
\* applyable, but some specific (from, amount, fee) combinations push
\* the cost above the sender's running balance and trigger the
\* ApplyTxInsufficientBalance disjunct. Both branches are reachable.
\*
\* MaxHeight=4 gives 4 finalization cycles. Combined with the empty-
\* creators branch (StartNextBlock with <<>> sequence is reachable),
\* the model exercises both the with-creators distribution path AND
\* the no-creators preservation path within the bounded run.
\*
\* The combination produces a state space on the order of 10^5
\* distinct states — comfortably within TLC's single-core exhaustive
\* run capacity for sub-minute completion. The action set is total
\* on every reachable state (something is always enabled — at minimum
\* SubmitTx with a low-cost tx, or FinalizeBlock with whatever
\* creators happen to be assigned), so no deadlock states arise from
\* the action structure itself; the height-MaxHeight ceiling is the
\* only terminal condition.
\*
\* Submit-then-apply-then-finalize, submit-with-insufficient-balance-
\* then-skip-then-finalize, accumulate-multi-tx-then-finalize-empty-
\* committee, dust-distribution-when-fees-mod-creators-nonzero, and
\* multi-domain interleavings are all reachable from this configuration.

CONSTANTS
    Domains            = {a, b, c, d}
    MaxHeight          = 4
    MaxAmount          = 3
    MaxFee             = 2
    TotalSupplyInitial = 20

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_BalanceNonNegative
    Inv_BlockTotalFeesNonNegative
    Inv_A1Conservation
    Inv_FeeDistributionDeterministic

PROPERTIES
    Inv_NoFeeOnSkip
    Inv_EmptyCreatorsNoDistribute
    Prop_EventualFeeDrain
    Prop_SupplyConservation
