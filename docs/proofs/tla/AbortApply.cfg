\* TLC configuration for AbortApply.tla
\* Model: 3 domains, MaxRound=4, InitialStake=30, SUSPENSION_SLASH=10.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (RecordAbort / ApplyPhase1Abort
\* / ApplyPhase2Abort / ApplyAbortDomainInclusion / AdvanceRound) with
\* realistic interleavings of phase-1 / phase-2 / no-stake apply branches.
\*
\* SUSPENSION_SLASH=10 matches `include/determ/chain/params.hpp:65`
\* (the production default). With InitialStake=30 each domain can
\* absorb three Phase-1 aborts (30 → 20 → 10 → 0) before reaching
\* zero, which exhaustively witnesses:
\*   - Inv_NoFullForfeitureOnAbort: the 30→20, 20→10 steps preserve
\*     post > 0 (the SUSPENSION_SLASH < pre branch); the 10→0 step
\*     fires only when pre = SUSPENSION_SLASH (boundary case — the
\*     post = 0 outcome is permitted because pre - SUSPENSION_SLASH
\*     = 0; the invariant's `pre <= SUSPENSION_SLASH` clause admits
\*     exactly this boundary, matching production bounded slashing
\*     deduct = min(SUSPENSION_SLASH, locked) at chain.cpp:1324).
\*   - Once the domain reaches 0, ApplyPhase1Abort's guard
\*     `stakes[d] > 0` fails and ApplyAbortDomainInclusion takes over.
\*     The phase-distinction collapses (T-A5).
\*
\* MaxRound=4 is enough for:
\*   - RecordAbort(d, 1) + ApplyPhase1Abort(d) — witnesses the
\*     standard slash-and-record path. Single step drains stakes[d]
\*     from 30 to 20 and bumps abort_records[d].count from 0 to 1.
\*   - RecordAbort(d, 2) + ApplyPhase2Abort(d) — witnesses the
\*     T-A2 "Phase-2 aborts do NOT slash" claim. The
\*     accumulated_slashed' = accumulated_slashed clause of
\*     Prop_Phase2NoSlash fires.
\*   - RecordAbort(d, 1) ×3 followed by ApplyPhase1Abort(d) ×3 —
\*     drains stakes[d] to 0, witnesses the boundary case for
\*     Inv_NoFullForfeitureOnAbort (the third ApplyPhase1Abort
\*     fires when pre = SUSPENSION_SLASH = 10, draining to 0).
\*   - RecordAbort(d, 1) at h=0 + AdvanceRound + ApplyPhase1Abort
\*     drains stakes[d] to 20 + further RecordAbort(d, 1) at
\*     h=2 + ApplyAbortDomainInclusion fires only after stakes[d]
\*     reaches 0 (which requires three drains; reachable within
\*     MaxRound=4 with interleaved RecordAbort).
\*   - Multi-domain interleaving: RecordAbort(a, 1) +
\*     RecordAbort(b, 2) + ApplyPhase1Abort(a) + ApplyPhase2Abort(b) —
\*     witnesses Prop_EventualApply queue drain under fairness;
\*     across three domains the queue ordering exercises FIFO drain.
\*   - Equivocation-style attack: RecordAbort(d, 1) twice in
\*     sequence — second drain witnesses Inv_AbortRecordsMonotonic
\*     (count grows 0 → 1 → 2) AND that the abort_records cache
\*     never decrements (Inv_AbortRecordsMonotonic).
\*
\* InitialStake=30 lets stakes[d] range over {0, 10, 20, 30}; the
\* SUSPENSION_SLASH = 10 stride means each ApplyPhase1Abort drains
\* by exactly 10 until stakes reaches 0. The
\* Inv_SlashedNeverExceedsTotal-style bound is implicit in
\* INITIAL_TOTAL_STAKE = InitialStake * Cardinality(Domains) = 90;
\* TLC explores every accumulated_slashed in 0..90 and confirms
\* via Inv_SlashedMonotonic that the field only grows.
\*
\* Domains={a, b, c} gives a non-trivial 3-domain interleaving:
\* per-domain Apply gates are independent, and the queue ordering
\* exercises the FIFO-drain semantics. Multi-domain abort
\* sequences witness the Prop_EventualApply queue-shrinking
\* property under fairness.
\*
\* RecordAbort-then-AdvanceRound-then-Apply, queue-multiple-aborts-
\* then-drain-in-order, drain-to-zero-then-RecordAbort-again
\* (DomainInclusion branch), and Phase-1 / Phase-2 mixed
\* interleavings on the same domain are all reachable from this
\* configuration.

CONSTANTS
    Domains          = {a, b, c}
    MaxRound         = 4
    InitialStake     = 30
    SUSPENSION_SLASH = 10

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_StakeNonNegative
    Inv_NoRegistryDeactivation

PROPERTIES
    Inv_SlashedMonotonic
    Inv_NoFullForfeitureOnAbort
    Inv_AbortRecordsMonotonic
    Prop_EventualApply
    Prop_Phase2NoSlash
