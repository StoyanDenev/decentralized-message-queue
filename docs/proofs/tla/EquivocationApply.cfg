\* TLC configuration for EquivocationApply.tla
\* Model: 3 domains, MaxHeight=4, MaxStake=5, Sentinel=1000.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (Equivocate / ApplyEquivocation
\* / ApplyEquivocationGhost / ApplyEquivocationAlreadyDeactivated /
\* AdvanceHeight) with realistic interleavings of legitimate-apply
\* and adversarial / dual-mechanism / ghost branches.
\*
\* Measured sizing: 17,600 distinct states, depth 14, ~7s (tla2tools
\* v1.8.0, invariants + all four temporal properties). The dominant
\* state multiplier is the pending_events queue; the spec bounds it
\* at Cardinality(Domains) = 3 simultaneously queued events (see the
\* Equivocate comment in EquivocationApply.tla) — the unshrunk bound
\* MaxHeight + |Domains| = 7 blew the space past 10^6 distinct
\* states and the 120s CI budget without adding any interleaving
\* not already covered at bound 3.
\*
\* Sentinel=1000 is far larger than MaxHeight + 1 = 5, so the ConfigOK
\* assumption (Sentinel > MaxHeight + 1) is satisfied and the
\* height + 1 mutation on inactive_from never collides with the
\* "never deactivated" marker.
\*
\* MaxHeight=4 is enough for:
\*   - Equivocate at h=0 + ApplyEquivocation at h=0 + height to h=1
\*     (witnesses inactive_from = 1; Inv_DeactivatedAfterSlash)
\*   - Multi-equivocation: Equivocate(d) at h=0 + ApplyEquivocation(d)
\*     drains stake -> 0 + Equivocate(d) again at h=1 +
\*     ApplyEquivocationGhost(d) (witnesses Inv_NoDoubleSlash —
\*     second Apply* contributes 0 to accumulated_slashed)
\*   - Equivocate(d) at h=0 + AdvanceHeight to h=3 +
\*     ApplyEquivocationGhost (witnesses inactive_from <= height
\*     gating)
\*   - Three-way interleavings: Equivocate(a) + Equivocate(b) +
\*     Equivocate(c) followed by drains in any order (queue FIFO
\*     drain witnesses Prop_EventualSlash)
\*   - Deregister-then-equivocate is OUT OF SCOPE (no DEREGISTER
\*     action in this spec — the AlreadyDeactivated branch is
\*     reached by registering an Equivocate on a domain that is
\*     ALREADY active=FALSE — in this spec that only happens via
\*     prior ApplyEquivocation; the dual-mechanism branch fires
\*     when stakes are non-zero post a previous active->inactive
\*     transition with intermediate stake re-accumulation in the
\*     real chain, which is FB8 territory; this spec models the
\*     apply-side guard space exhaustively without needing to
\*     re-stake — see Modeling scope in EquivocationApply.tla)
\*
\* MaxStake=5 lets stakes[d] range over {0, 1, ..., 5}; the Init
\* state is uniform at 5 per domain, and ApplyEquivocation zeros
\* in one step. The Inv_SlashedNeverExceedsTotal invariant uses
\* INITIAL_TOTAL_STAKE = MaxStake * Cardinality(Domains) = 15.
\* TLC explores every (accumulated_slashed) value from 0 to 15
\* and confirms it never exceeds the bound.
\*
\* Domains={a, b, c} gives a non-trivial 3-domain interleaving:
\* per-domain Apply gates are independent, and the queue ordering
\* exercises the FIFO-drain semantics. Multi-domain equivocation
\* sequences witness the Prop_EventualSlash queue-shrinking
\* property under fairness.
\*
\* Submit-equivocate-then-tick-to-apply, queue-multiple-events-
\* then-drain-in-order, equivocate-twice-same-domain (ghost
\* second hit), and ApplyEquivocationGhost via tick-past-
\* inactive_from are all reachable from this configuration.

CONSTANTS
    Domains   = {a, b, c}
    MaxHeight = 4
    MaxStake  = 5
    Sentinel  = 1000

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_StakeNonNegative
    Inv_SlashedNeverExceedsTotal
    Inv_DeactivatedAfterSlash

PROPERTIES
    Inv_SlashedMonotonic
    Inv_NoDoubleSlash
    Prop_EventualSlash
    Prop_StateMonotone
