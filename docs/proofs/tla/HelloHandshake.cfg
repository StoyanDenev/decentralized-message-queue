\* TLC configuration for HelloHandshake.tla
\* Model: WireVersions = {0, 1}, ChainIds = {"chain_a", "chain_b"},
\*        NodeIds = {"n1", "n2", "n3"}, MaxHandshakes = 3.
\*
\* Measured sizing (tla2tools v1.8.0, 1 worker): 378,505 distinct
\* states (1.37M generated), depth 7, ~70s (≈80s under CPU
\* contention). This exhausts within the CI budget while still
\* exercising the reachable action disjuncts
\* (InitiateHandshake / ProcessHandshake / RejectMismatchedChain;
\* RejectIncompatibleWireVersion needs WireVersions = {0, 1, 2} —
\* see the WireVersions note below) with realistic interleavings of
\* cross-chain admission attempts, wire-version-compatibility
\* checks, and multi-peer handshake-triangle scheduling.
\*
\* WireVersions = {0, 1} gives 2 distinct wire-version values:
\*   - 0 = kWireVersionLegacy (pre-A3 peers default here; modeled
\*         as the kWireVersionLegacy constant in the spec).
\*   - 1 = kWireVersionBinary = kWireVersionMax (the highest version
\*         this build understands; admission gate's compatibility
\*         predicate is `wire_version <= kWireVersionMax`).
\*   - With |WireVersions| = 2, both the in-bounds case (0 or 1)
\*     and the boundary at kWireVersionMax are exercised. To also
\*     exercise the strict-reject branch (RejectIncompatibleWireVersion),
\*     extend WireVersions to {0, 1, 2} — TLC will then explore
\*     InitiateHandshake with wv=2, which trips the
\*     wire_version > kWireVersionMax pre-condition for the
\*     dedicated reject action.
\*
\* ChainIds = {"chain_a", "chain_b"} gives 2 distinct chain
\* identifiers:
\*   - "chain_a" and "chain_b" exercise both the matching case
\*     (from.chain_id = receiver.chain_id ⇒ ACCEPT path possible)
\*     and the mismatch case (from.chain_id /= receiver.chain_id ⇒
\*     REJECT path via either ProcessHandshake's catch-all reject
\*     OR the dedicated RejectMismatchedChain action).
\*   - With |ChainIds| = 2, the cross-chain rejection surface is
\*     reachably exercised; INV_ChainIdAgreement holds because the
\*     ProcessHandshake's cid_match predicate gates the ACCEPT
\*     branch on the equality.
\*
\* NodeIds = {"n1", "n2", "n3"} gives 3 distinct peer node
\* identifiers:
\*   - n1, n2, n3 exercise the three-way handshake triangle
\*     (n1 ↔ n2, n1 ↔ n3, n2 ↔ n3) plus the self-loop rejection
\*     (`from /= to` pre-condition in InitiateHandshake).
\*   - With |NodeIds| = 3, the multi-peer interleaving exposes the
\*     INV_AcceptedPeersSubsetHandshakes contract: every member of
\*     accepted_peers has a corresponding ACCEPT entry in
\*     peer_handshakes.
\*
\* MaxHandshakes = 3 bounds peer_handshakes growth so TLC exhausts
\* within the CI budget. 3 is the minimum bound that still fits the
\* full n1→n2 / n1→n3 / n2→n3 handshake triangle in one behavior;
\* 4 blows the budget (~2.7×10⁷ reachable states — 72 per-entry
\* combos to the 4th power — TLC spills its state queue to disk and
\* cannot finish in 120s). The bound exercises:
\*   - Init at all-empty (no handshakes pending, no peers accepted).
\*   - InitiateHandshake(n1, n2) → peer_handshakes grows to 1.
\*   - InitiateHandshake(n1, n3) → peer_handshakes grows to 2
\*     (parallel pending handshakes).
\*   - ProcessHandshake(1) → entry 1 transitions PENDING → ACCEPT
\*     (assuming chain_id match + wire_version compat); accepted_peers
\*     grows to {n1}.
\*   - RejectMismatchedChain(2) → entry 2 transitions PENDING →
\*     REJECT (assuming chain_id mismatch); accepted_peers unchanged.
\*   - InitiateHandshake(n2, n3) → peer_handshakes grows to 3,
\*     completing the handshake triangle (mixed
\*     ACCEPT/REJECT/PENDING interleaving).
\*   - At MaxHandshakes = 3 the Stutter action pins the bounded
\*     state space (once all entries have been resolved);
\*     PROP_EventualHandshakeResolution +
\*     PROP_NoSilentAcceptOnMismatch witnesses the resolution +
\*     reject-on-mismatch composition.

CONSTANTS
    WireVersions  = {0, 1}
    ChainIds      = {"chain_a", "chain_b"}
    NodeIds       = {"n1", "n2", "n3"}
    MaxHandshakes = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_ChainIdAgreement
    INV_WireVersionCompat
    INV_HelloIsJsonAlways
    INV_AcceptedPeersSubsetHandshakes

PROPERTIES
    PROP_EventualHandshakeResolution
    PROP_NoSilentAcceptOnMismatch
