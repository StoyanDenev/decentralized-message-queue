\* TLC configuration for SubscriberReconnectSeam.tla (FB73).
\* Model: MAX_BLOCKS = 3, TX_MAX = 1 — the SMALLEST exhibit that reaches the
\* crux the reconnect seam rests on: a MULTI-EVENT block (two matching tx,
\* tx_index 0 and 1, on the same block_index) delivered PARTIALLY across a
\* mid-block disconnect, then re-covered by the inclusive redial. TX_MAX = 1
\* gives blocks {(b,0),(b,1)} — exactly the (B,0)-delivered / (B,1)-pending
\* seam the inclusive-since choice must close (and the EXCLUSIVE mutant loses).
\* MAX_BLOCKS = 3 gives enough blocks for a below-frontier / at-frontier /
\* above-frontier split under repeated Disconnect/Reconnect.
\*
\* Init enumerates every matching \subseteq EventId (EventId has
\* MAX_BLOCKS * (TX_MAX+1) = 3 * 2 = 6 pairs -> 2^6 = 64 chains), so every
\* arrangement of which (block, tx) pairs match — including multi-event
\* blocks, empty, and all-matching — is explored against every interleaving
\* of Apply / Deliver / Disconnect / Reconnect, with original_since fixed at 0
\* (widest window).
\*
\* Measured (tla2tools v1.8.0, java 11, 2026-07-04): 2240 distinct states
\* (4109 generated), depth 13, checked in ~4s — well under the harness 240s /
\* ~2M-state budget. The four safety INVARIANTS (INV_TypeOK, INV_NoLoss,
\* INV_NoDup, INV_LastBlockSound) hold at every reachable state; the temporal
\* PROPERTY PROP_AllEventuallyDelivered is checked under the Spec fairness
\* (SF on Deliver, WF on Reconnect — liveness-only; safety is fairness-
\* independent). SF (not WF) on Deliver is load-bearing: the adversarial
\* Disconnect repeatedly disables Deliver, so only strong fairness discharges
\* eventual delivery under repeated disconnect/reconnect churn. The harness
\* runs with -deadlock (deadlock-as-error OFF): the chain-idle / fully-drained
\* terminal states are benign exhibits.
\*
\* NON-VACUITY (M1, EXCLUSIVE-since mutant, scratch copy — deleted after the
\* run): flipping Reconnect to connSince = lastBlock + 1 falsifies INV_NoLoss
\* at 645 distinct states / 5-state counterexample, with the concrete
\* lost-same-block trace (deliver (0,0), disconnect mid-block, reconnect
\* EXCLUSIVE skips block 0, (0,1) never delivered). See the spec header's M1
\* note for the full trace. The inclusive-since choice is load-bearing.
\*
\* Probe_PartialBlockUnreachable is deliberately NOT listed: it is the M1
\* reachability probe (EXPECTED FALSIFIED — see the spec header's dated probe
\* note; listing it here would turn the green gate red).

CONSTANTS
    MAX_BLOCKS = 3
    TX_MAX = 1

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_NoLoss
    INV_NoDup
    INV_LastBlockSound

PROPERTIES
    PROP_AllEventuallyDelivered
