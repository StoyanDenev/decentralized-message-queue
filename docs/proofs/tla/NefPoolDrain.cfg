\* TLC configuration for NefPoolDrain.tla
\* Model: 3 domains {a, b, c}, InitialNefPool = 8, MaxHeight = 4,
\* ZerothAddress = zeroth (sentinel symbol distinct from Domains).
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (SubmitRegister /
\* ApplyFirstRegister / ApplyReRegister) with realistic interleavings.
\*
\* Domains = {a, b, c} gives three regular addresses; all three can
\* first-register, witnessing the K=3 case of Inv_GeometricExhaustion
\* (2^3 * pool <= InitialNefPool, i.e., pool <= 1 after 3 distinct
\* first-registers).
\*
\* InitialNefPool = 8 lets the floor-half drain fire 4 times before
\* reaching zero (8 -> 4 -> 2 -> 1 -> 0). With |Domains| = 3 the
\* model only fires 3 distinct first-registers, leaving the pool at
\* 1 in the canonical exhaustive trace. To witness the T-N4 zero-pool
\* noop branch (pool = 0 -> ApplyFirstRegister with 0 drain), the cfg
\* would extend Domains to {a, b, c, d} or shrink InitialNefPool to 4.
\* The current 3-domain InitialNefPool=8 cfg covers the geometric
\* drain prefix (8 -> 4 -> 2 -> 1) which is the headline T-N1
\* witness.
\*
\* MaxHeight = 4 caps the apply-action count. With 3 domains and
\* SubmitRegister-then-ApplyFirstRegister cycle (2 actions per
\* domain), 3 cycles = 6 actions exceeds MaxHeight = 4 — so the
\* model covers up to 2 distinct first-registers + 1 partial
\* register cycle, OR 2 first-registers + 1 re-register interleave.
\* This is sufficient for Inv_GeometricExhaustion K = 0, 1, 2 to be
\* exercised; K = 3 requires MaxHeight = 6.
\*
\* ZerothAddress = zeroth is a sentinel string distinct from the
\* Domains. The ASSUME at the top of the .tla file enforces
\* ZerothAddress \notin Domains; TLC verifies this constraint.
\*
\* Coverage matrix (within MaxHeight = 4):
\*   - SubmitRegister(a) -> pending = <<a>>                       (1 action)
\*   - ApplyFirstRegister(a) -> pool=4, registrants={a}, balances[a]=4
\*                                                                (2 actions)
\*   - SubmitRegister(b) -> pending = <<b>>                       (3 actions)
\*   - ApplyFirstRegister(b) -> pool=2, registrants={a,b}, balances[b]=2
\*                                                                (4 actions, MaxHeight reached)
\*
\* Interleavings TLC explores:
\*   - Submit ordering: 6 permutations of (a, b, c) submission order
\*   - Apply ordering: head-first per pending_register
\*   - Re-register: SubmitRegister(a) again post-ApplyFirstRegister(a)
\*     fires ApplyReRegister(a) at the head — no pool change
\*   - Mixed: Submit(a) Submit(b) Apply(a) Apply(b) vs
\*            Submit(a) Apply(a) Submit(b) Apply(b)
\*
\* Inv_DrainOnlyOnFirstRegister is the structural witness against the
\* registration-churn drain attack: the cfg explicitly admits
\* SubmitRegister(a) followed by ApplyReRegister(a), and the
\* invariant verifies that no pool decrease occurs across that step.
\*
\* Inv_A1Conservation is verified across every reachable state: the
\* sum balances[zeroth] + balances[a] + balances[b] + balances[c]
\* must equal InitialNefPool = 8 at every step.

CONSTANTS
    Domains        = {a, b, c}
    InitialNefPool = 8
    ZerothAddress  = zeroth
    MaxHeight      = 4

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_PoolNonNegative
    Inv_GeometricExhaustion
    Inv_A1Conservation

PROPERTIES
    Inv_DrainOnlyOnFirstRegister
    Prop_EventualExhaustion
    Prop_RegistrationIsTerminal
