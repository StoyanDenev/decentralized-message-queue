\* TLC configuration for EquivocationEvidenceVerify.tla (FB48).
\* Model: 2 signers (one registered, one not), 2 digests, MaxVerifies=4.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every disjunct of the five-clause verifier predicate AND
\* every reject branch:
\*
\*   Signers = {a, b} — `a` is registered (pubkey known to the verifier),
\*     `b` is NOT. Evidence naming `b` as equivocator trips the C3
\*     registry gate (INV_UnregisteredRejected); evidence naming `a` can
\*     pass C3 and proceed to the C4 verify gate.
\*
\*   Registered = {a} — a single registered signer. The Evidence universe
\*     ranges equivocator over BOTH {a, b}, so the unregistered-signer
\*     reject path (C3) is reachable.
\*
\*   Digests = {d1, d2} — two distinct block_digests. Lets the model
\*     reach BOTH the digest_a = digest_b case (C1 reject;
\*     INV_EqualDigestRejected) and the digest_a # digest_b case (the
\*     genuine-conflict precondition).
\*
\*   MaxVerifies = 4 — enough to log, within a single trace, one verdict
\*     per outcome class:
\*       - genuine accept: a signs d1 + a signs d2, then VerifyEvidence
\*         with (equivocator=a, d1/sig_a1, d2/sig_a2) -> ACCEPT
\*         (INV_AcceptImpliesGuilty + INV_GuiltyImpliesAccept witness).
\*       - C1 reject: digest_a = digest_b = d1 -> REJECT
\*         (INV_EqualDigestRejected).
\*       - C2 reject: sig_a = sig_b (same sig presented twice) -> REJECT
\*         (INV_EqualSigRejected).
\*       - C3 reject: equivocator = b (unregistered) -> REJECT
\*         (INV_UnregisteredRejected).
\*       - C4 reject: a sig absent from valid_sigs (no prior SignMessage)
\*         or bound to the wrong (signer, digest) -> REJECT
\*         (INV_ForgedSigRejected).
\*
\* SHA-256 / Ed25519 are the abstract-term devices inside the .tla (the
\* FB23 / FB28 / FB44 pattern): valid_sigs membership is the spec-layer
\* projection of crypto::verify, populated only by SignMessage (the true
\* key owner). The .cfg supplies only the FINITE input universe;
\* ForgeEvidence reaches every malformed record over that universe so the
\* reject invariants are checked against reachable counterexample shapes.
\*
\* A Byzantine signer's equivocation is modeled WITHOUT forgery: `a`
\* calls SignMessage(a, d1) and SignMessage(a, d2) — two genuine sigs
\* over distinct digests — and the verifier ACCEPTS the resulting
\* evidence (the signer held the secret; no key compromise needed).

CONSTANTS
    Signers     = {a, b}
    Registered  = {a}
    Digests     = {d1, d2}
    MaxVerifies = 4

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_AcceptImpliesGuilty
    INV_EqualDigestRejected
    INV_EqualSigRejected
    INV_UnregisteredRejected
    INV_ForgedSigRejected

\* SAFETY-only invariant set. The completeness/determinism pair
\* (INV_GuiltyImpliesAccept = T-EV2, INV_VerdictDeterministic = T-EV7) is
\* DELIBERATELY omitted from the checked set: under this model SignMessage
\* (valid_sigs growth) is unguarded in Next, so a record that REJECTs
\* before a missing sig arrives can re-verify to ACCEPT later — a reachable
\* REJECT->ACCEPT flip that violates both. That flip is BENIGN FOR SAFETY:
\* the verifier never ACCEPTs a non-equivocation (INV_AcceptImpliesGuilty
\* plus the four C1-C4 reject invariants hold over the entire model), which
\* is exactly the property the irreversible stake-slash decision rests on.
\* Completeness ("a genuine equivocation is eventually provable once both
\* sigs are observed") is an availability concern, not a soundness one, and
\* is out of scope for this evidence-verifier gate model.

PROPERTIES
    PROP_EventualVerdict
