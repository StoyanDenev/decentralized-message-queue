\* TLC configuration for WireFrameCap.tla
\* Model: MsgTypes = {"snapshot_resp", "block", "contrib"},
\*        FrameSizes = {0, 1, 2, 5, 16, 20}, MaxFrames = 3.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (ArriveFrame / RejectAtFraming /
\* BufferBody / RejectAtTypeCap / Dispatch) across all three cap
\* tiers and every gate-boundary case.
\*
\* MsgTypes = {"snapshot_resp", "block", "contrib"} spans all three
\* cap tiers of max_message_bytes (messages.hpp:124-152):
\*   - "snapshot_resp" = the 16 MB tier (SNAPSHOT_RESPONSE /
\*     CHAIN_RESPONSE; Cap = SixteenMB = 16). The only type-cap tier
\*     that needs the full framing ceiling.
\*   - "block"         = the 4 MB tier (BLOCK / BEACON_HEADER /
\*     SHARD_TIP / CROSS_SHARD_RECEIPT_BUNDLE / HEADERS_RESPONSE;
\*     Cap = FourMB = 4).
\*   - "contrib"       = the 1 MB default tier (all consensus chatter
\*     / requests / tx; Cap = OneMB = 1). Falls through Cap's final
\*     ELSE arm — the structural witness that a newly-added
\*     uncategorised MsgType lands at the tight 1 MB default.
\*   With these three, all three branches of Cap(t) are exercised and
\*   LargeTypes = {"snapshot_resp", "block"} is non-trivial (so
\*   INV_DefaultTypeTightlyBounded is checked against the "contrib"
\*   non-large representative).
\*
\* FrameSizes = {0, 1, 2, 5, 16, 20} picks declared body lengths
\* (scaled by 1 MB) straddling each cap boundary so the pass / drop
\* branches at each gate are reachable:
\*   - 0  : empty frame -> Stage-1 reject (RejectAtFraming via the
\*          `sz = 0` disjunct) for EVERY type.
\*   - 1  : at OneMB -> passes all three type caps (contrib / block /
\*          snapshot_resp all dispatch). Lower boundary witness.
\*   - 2  : over OneMB, under FourMB -> a "contrib" drops at Stage 2
\*          (RejectAtTypeCap) but a "block" / "snapshot_resp"
\*          dispatches. Exercises the default-tier tightness
\*          (INV_DefaultTypeTightlyBounded: a 2-unit contrib never
\*          reaches DISPATCHED).
\*   - 5  : over FourMB, under SixteenMB -> a "block" drops at Stage 2
\*          but a "snapshot_resp" dispatches. Exercises the 4 MB-tier
\*          boundary.
\*   - 16 : at SixteenMB -> passes the framing gate (sz <= SixteenMB)
\*          AND the snapshot_resp type cap; a "block" / "contrib" at
\*          16 drops at Stage 2. Upper-boundary witness for the
\*          framing ceiling + the 16 MB type cap.
\*   - 20 : over SixteenMB -> Stage-1 reject (RejectAtFraming via the
\*          `sz > SixteenMB` disjunct) for EVERY type. No body is
\*          buffered (INV_BufferBounded: a 20-unit frame is never
\*          buffered).
\*
\* MaxFrames = 3 bounds frames growth to one frame per disposition
\* class — Stage-1 drop, Stage-2 drop, and dispatch co-resident in a
\* single trace:
\*   - Init at all-empty (no frames arrived).
\*   - ArriveFrame("contrib", 20)       -> frame 1 ARRIVED.
\*   - RejectAtFraming(1)               -> frame 1 DROPPED (Stage 1;
\*       over the framing ceiling; buffered[1] stays FALSE).
\*   - ArriveFrame("contrib", 2)        -> frame 2 ARRIVED.
\*   - BufferBody(2)                    -> frame 2 BUFFERED
\*       (buffered[2] = TRUE).
\*   - RejectAtTypeCap(2)               -> frame 2 DROPPED (Stage 2;
\*       2 > Cap("contrib") = 1).
\*   - ArriveFrame("block", 2)          -> frame 3 ARRIVED ;
\*       BufferBody(3) ; Dispatch(3)    -> frame 3 DISPATCHED
\*       (2 <= Cap("block") = 4).
\*   The 16 MB-tier dispatch (ArriveFrame("snapshot_resp", 16) ;
\*   BufferBody ; Dispatch — 16 <= Cap("snapshot_resp") = 16) is
\*   exercised in sibling traces: TLC explores every (type, size)
\*   choice at every arrival slot, so each documented gate branch
\*   above is reachable at every frame index. Only the 4-dispositions-
\*   in-one-trace composition is traded away, and no invariant couples
\*   distinct frames (all are per-frame universals).
\*   - At MaxFrames = 3 the Stutter action pins the bounded state
\*     space once every frame has reached a terminal stage;
\*     PROP_EventualFrameResolution + PROP_NoSilentOversizeDispatch
\*     witness the resolution + no-oversize-dispatch composition.
\*
\* Sizing (measured, tla2tools v1.8.0 harness): a frame record has 48
\* reachable (type, sz, stage, buffered) valuations, so the space is
\* sum_{k=0..MaxFrames} 48^k. MaxFrames = 4 gave ~5.4M distinct states
\* and blew the 120s CI budget (with the two liveness properties TLC
\* was still at depth 7 after 270s). MaxFrames = 3 gives 112,945
\* distinct states, depth 10, ~29s including liveness — inside the
\* budget with margin.

CONSTANTS
    MsgTypes   = {"snapshot_resp", "block", "contrib"}
    FrameSizes = {0, 1, 2, 5, 16, 20}
    MaxFrames  = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_FramingCeilingEnforced
    INV_DispatchedWithinTypeCap
    INV_DefaultTypeTightlyBounded
    INV_OversizeNeverDispatched
    INV_BufferBounded
    INV_StageProgression

PROPERTIES
    PROP_EventualFrameResolution
    PROP_NoSilentOversizeDispatch
