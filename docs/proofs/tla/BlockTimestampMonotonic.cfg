\* TLC configuration for BlockTimestampMonotonic.tla
\* Model: 2 nodes, MaxChainLength=3, MaxTimestamp=3, MaxTimestampSkew=1,
\* TxUniverse={t1}, monotonic_gate=FALSE.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (ProduceBlock / ApplyBlock /
\* TamperHistoricalTimestamp / ReloadChain) with realistic
\* interleavings of legitimate production, cross-node gossip,
\* adversarial tampering, and load-time reload.
\*
\* monotonic_gate=FALSE matches the current R24A5-pinned chain
\* behavior (Chain::append accepts backward/equal/far-future/negative
\* timestamps; see src/main.cpp::test-time-monotonicity scenarios 1,
\* 2, 3, 8). Under this setting, INV_TimestampMonotonic is vacuously
\* satisfied — the spec's structural invariants T-2 / T-3 / T-4 / T-5
\* + the temporal property PROP_NoSilentDivergence are the meaningful
\* invariants checked.
\*
\* To exercise the forward-looking S-035 path-1 contract (the
\* strict-monotonic gate ENABLED), flip monotonic_gate to TRUE.
\* Under that setting, ApplyBlock rejects b if b.timestamp <
\* head.timestamp; the gate's structural witness is the ts_ok
\* predicate's non-vacuous branch. INV_TimestampMonotonic becomes
\* the headline forward-looking invariant.
\*
\* MaxChainLength=3 is enough for:
\*   - ProduceBlock at h=0 + ApplyBlock + ProduceBlock at h=1 +
\*     ApplyBlock + ProduceBlock at h=2 (chain reaches genesis + 3
\*     blocks; INV_5 EqualTimestampAccepted exercised at the
\*     adjacent-equal-timestamp case)
\*   - TamperHistoricalTimestamp at the middle block (i=2) +
\*     ReloadChain witnesses INV_4 HistoricalTamperCascades +
\*     PROP_NoSilentDivergence
\*   - Two nodes' chains can diverge via different sampled timestamps
\*     from the [head.timestamp, head.timestamp + 1] range,
\*     witnessing the per-node independence of invariants.
\*
\* MaxTimestamp=3 keeps the universe small (Timestamps = {0, 1, 2, 3})
\* while admitting enough headroom for forward-monotonic sequences
\* of length up to MaxChainLength.
\*
\* MaxTimestampSkew=1 means a producer samples timestamps from
\* {head.timestamp, head.timestamp + 1} — exercises both T-1 strict-
\* increase and T-5 equal-timestamp boundary cases reachably.
\*
\* TxUniverse={t1} keeps the txs subset universe at {{}, {t1}} — 2
\* states per block. Enough for distinct-block reachability without
\* blowing up TLC's branching factor.
\*
\* Nodes={n1, n2} gives a non-trivial 2-node cross-gossip interleaving:
\* ProduceBlock at one node + ApplyBlock at the other exercises the
\* pending_inbox gossip queue; TamperHistoricalTimestamp at one node
\* + ReloadChain at the same node + simultaneous honest production
\* at the other witnesses the per-node independence of tampered_at
\* and load_throws.

CONSTANTS
    Nodes              = {n1, n2}
    MaxChainLength     = 3
    MaxTimestamp       = 3
    MaxTimestampSkew   = 1
    TxUniverse         = {t1}
    monotonic_gate     = FALSE

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_TimestampMonotonic
    INV_DigestExcludesTimestamp
    INV_SigningBytesIncludesTimestamp
    INV_HistoricalTamperCascades
    INV_EqualTimestampAccepted

PROPERTIES
    PROP_EventualBlockProduction
    PROP_NoSilentDivergence
