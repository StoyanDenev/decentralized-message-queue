\* TLC configuration for DAppRegistrationRead.tla (FB50).
\* Model: 2 domains, 2 owners, 2 service pubkeys, 1 height, 1 extra;
\* MaxReads=2. A small finite universe that still exercises every
\* disjunct of the four-gate trustless-read pipeline (anchor / head /
\* path / bind) with realistic interleavings of Read actions against the
\* fixed committed d:-namespace registry.
\*
\* SHA-256 / the canonical DAppEntry encoding is the injective-term
\* abstraction inside the .tla (Encode(e) = <<"dapp_leaf", e>>); the .cfg
\* supplies only the FINITE domain x owner x pubkey x height x extra
\* universe over which DAppEntry + DaemonFlags range. The bind gate
\* (T-DR5) reduces to claimed = committed under that abstraction, so the
\* daemon-flag universe TLC enumerates includes BOTH a faithful claimed
\* entry (equal to the committed one -> bind passes) AND forged claimed
\* entries (a different owner / pubkey / height / extra -> bind fails).
\*
\* The four gates each have an honest + a forged variant in the
\* enumerated DaemonFlags universe:
\*   anchor_honest : TRUE | FALSE  — daemon ran our chain, or did not.
\*   head_honest   : TRUE | FALSE  — committee-signed head, or forged.
\*   path_honest   : TRUE | FALSE  — honest d:<domain> Merkle path, or forged.
\*   claimed       : ranges over DAppEntry — a faithful claim binds; a
\*                   forged claim (any field differs from committed) fails
\*                   the bind gate.
\* TLC's \E daemon \in DaemonFlags in the Read action enumerates the full
\* cross product, so every single-gate-forged variant (anchor-forged,
\* head-forged, path-forged, bind-forged) is reachable, plus the
\* all-honest+faithful-claim accept case.
\*
\* committed — the fixed d:-namespace leaf domain at this state-root.
\* Because Init quantifies committed over [Domains -> CommittedShape],
\* TLC explores ALL legal committed mappings, including:
\*   * d1 committed, d2 absent  — so an absent-domain read (d2) is
\*     reachable; INV_NoAbsentAccept confirms it never accepts (no
\*     committed leaf -> path AND bind both fail).
\*   * both committed            — so a faithful read against d1 or d2
\*     accepts iff the daemon is honest on all four gates AND claims the
\*     committed entry.
\*   * both absent               — so no read ever accepts.
\* The full [Domains -> CommittedShape] enumeration is bounded by the
\* small Domains x CommittedShape universe and stays tractable.
\*
\* MaxReads=2 keeps the state space tractable (same rationale as the FB53
\* sibling UnstakeEligibilityRead.cfg): the read_log records ORDER, so
\* states grow as (|Domains| x |DaemonFlags|)^MaxReads = 64^MaxReads per
\* initial committed mapping (~1.0x10^5 distinct states total at 2;
\* MaxReads=5 would be ~10^9 and is intractable). Depth 1 already
\* reaches every outcome class as a first read — TLC branches over all
\* 64 (domain, daemon) pairs:
\*   * Read(d1, anchor-forged)         -> reject (T-DR2 / INV_AnchorGate)
\*   * Read(d1, head-forged)           -> reject (T-DR3 / INV_HeadGate)
\*   * Read(d1, path-forged)           -> reject (T-DR4 / INV_PathGate)
\*   * Read(d1, bind-forged claim)     -> reject (T-DR5 / INV_BindGate)
\*   * Read(d1, all-honest + faithful) -> accept (T-DR1 / INV_FourGateSound,
\*                                          T-DR6 / INV_FieldFaithful)
\*   * Read(absent domain)             -> reject (INV_NoAbsentAccept)
\* Depth 2 adds every ordered PAIR of reads — including two identical
\* (domain, daemon) reads, the witness pair PROP_Determinism (T-DR7)
\* needs. The seven invariants hold at every reachable state.
\*
\* INV_FieldFaithful (T-DR6) is non-trivial under this config: with two
\* owners x two pubkeys, a forged claimed entry that differs from the
\* committed one in ANY single field yields a DIFFERENT canonical
\* encoding (Encode is injective), so the bind gate rejects it. Heights
\* and Extras are singletons purely for tractability: those fields feed
\* no predicate logic in FB50 (no arithmetic — unlike FB53), and Encode's
\* injectivity is field-uniform, so owner / pubkey forgeries already
\* exercise the bind gate; varying heights / extras would only multiply
\* the state space. TLC verifies that NO accepted read carries a claimed
\* entry that differs from the committed entry in any field — the
\* d:-namespace anti-substitution guarantee at the application layer.

CONSTANTS
    Domains  = {d1, d2}
    Owners   = {o1, o2}
    PubKeys  = {k1, k2}
    Heights  = {0}
    Extras   = {x1}
    MaxReads = 2

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_FourGateSound
    INV_AnchorGate
    INV_HeadGate
    INV_PathGate
    INV_BindGate
    INV_FieldFaithful
    INV_NoAbsentAccept
    \* PROP_Determinism is a state predicate (holds at every reachable
    \* state), so TLC checks it as an invariant.
    PROP_Determinism

PROPERTIES
    PROP_EventualAnswer
