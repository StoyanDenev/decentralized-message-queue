\* TLC configuration for StakeForfeitureCascade.tla
\* Model: 2 domains {a, b}, MaxHeight=4, MaxStake=2, UnstakeDelay=2,
\* Sentinel=1000.
\*
\* The 2-domain Cardinality keeps the state space tractable while
\* still exercising every interleaving class the cascade is meant to
\* explore. The two-domain model is sufficient for the order-
\* sensitivity contract (T-C5) — the divergent end-states are
\* observable on a single domain; the second domain is included for
\* the cross-domain "slash one, don't touch the other" coverage.
\*
\* MaxHeight=4 + UnstakeDelay=2 give the model windows like:
\*   t=0: Submit STAKE; ApplyStake.
\*   t=1: Submit DEREGISTER; ApplyDeregister (arms unlock_height = 1+2 = 3).
\*   t=2: AdvanceHeight to 2 (pre-unlock — UnstakePost disabled here).
\*   t=2: Submit UNSTAKE; UnstakePre (fee-refund stutter).
\*   t=3: AdvanceHeight to 3 (now unlock window open).
\*   t=3: Submit UNSTAKE; UnstakePost (refund). OR:
\*   t=3: Submit EQUIVOCATE; ApplyEquivocate (full slash; UnstakePost
\*        then hits ghost branch on UNSTAKE retry).
\*
\* Order sensitivity (T-C5) is observable across these two branches:
\*   Order A end-state: balance += 0 (slash claimed the locked amount)
\*   Order B end-state: balance += stake (UnstakePost ran first)
\*
\* MaxStake=2 caps individual stake amounts (shrunk from 5 for TLC
\* tractability — the amount granularity only needs two values: stake
\* 1 of 2, then a STAKE of 2 exercises ApplyStakeReject). Per-domain
\* initial balance = MaxStake = 2: every domain has exactly enough
\* headroom for a single full STAKE before needing UNSTAKE to recycle.
\*
\* Sentinel=1000 is far larger than MaxHeight + UnstakeDelay + 1 = 7,
\* satisfying ConfigOK; the clear-to-Sentinel transition on
\* UnstakePost remains monotone non-decreasing.
\*
\* Coverage matrix:
\*   - SubmitStake then ApplyStake: balance -> stake_locked move.
\*   - SubmitStake then ApplyStakeReject: balance < amount stutter.
\*   - SubmitDeregister then ApplyDeregister: arms unlock_height.
\*   - SubmitDeregister then ApplyDeregisterRejectAlreadyInactive:
\*     stutter on the second DEREGISTER.
\*   - SubmitUnstake then UnstakePre: pre-unlock fee-refund stutter.
\*   - SubmitUnstake then UnstakePost: post-unlock refund.
\*   - SubmitEquivocate then ApplyEquivocate: full slash.
\*   - SubmitEquivocate (post-slash) then ApplyEquivocateGhost: no-op.
\*   - Stake -> Equivocate -> UnstakePost: T-C4 post-slash UnstakePost
\*     is a structural no-op.
\*   - Stake -> Deregister -> Equivocate -> UnstakePost: T-C5 order-
\*     sensitive end-state with balance unchanged from pre-stake.
\*   - Stake -> Deregister -> AdvanceHeight -> UnstakePost ->
\*     Equivocate: T-C5 order-sensitive end-state with balance =
\*     pre-stake + amount; subsequent Equivocate hits ghost branch.
\*
\* Inv_A1Conservation tracks the supply identity:
\*   SumBalances + SumStakes + accumulated_slashed = 2 * 2 = 4
\* at every reachable state.

CONSTANTS
    Domains      = {a, b}
    MaxHeight    = 4
    MaxStake     = 2
    UnstakeDelay = 2
    Sentinel     = 1000

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_StakeNonNegative
    Inv_NoBalanceOnSlashedAccount
    Inv_A1Conservation

PROPERTIES
    Inv_UnstakePostSlashIsNoOp
    Inv_OrderSensitivity
    Inv_SlashedMonotonic
    Inv_UnlockMonotonic
    Prop_EventualResolution
    Prop_NoDoubleForfeit
