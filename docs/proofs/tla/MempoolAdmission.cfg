\* TLC configuration for MempoolAdmission.tla
\* Model: 2 domains, 1 hash, MaxNonce=2, MaxFee=1, Cap=2
\* (MaxPerSender = 2 and MaxRejections = 1 are in-module
\* tractability constants).
\*
\* Sizing note: measured, not estimated — this configuration exhausts
\* at 37,134 distinct states (227,347 generated, depth 16) in ~35s
\* single-worker including the 12-branch liveness pass, inside the
\* 120s harness budget. Larger sizings blow up combinatorially:
\* PROP_MempoolEventuallyDrains branches once per sig-valid element
\* of Tx (|Hashes| * |Domains| * (MaxNonce+1) * (MaxFee+1)) and
\* the mempool-sequence orderings grow factorially in the cap — the
\* historical {h1..h4}/MaxNonce=3/MaxFee=3/Cap=3 sizing produced 256
\* liveness branches over a >10^7-state behavior graph and could not
\* finish inside the harness timeout. The reductions are semantics-
\* preserving: hashes and fees are inert payload beyond the tie-break
\* comparisons, so two hashes and two fee tiers exercise every action
\* disjunct (AdmitTransaction's seven branches + ApplyBlock +
\* EvictStale + OverwriteSameAccountSameNonce + AdjustCap + Stutter)
\* with the same legitimate/adversarial interleavings.
\*
\* Cap=2 is the smallest value that lets the global-cap branches fire
\* while keeping a sender under quota to submit the trigger:
\*   - MaxPerSender=2 admits from d1 saturate the cap
\*   - d2 (under quota) at higher fee than the min triggers the
\*     fee-priority eviction at AdmitTransaction (5b)
\*   - d2 at fee <= min triggers the "cap_full" rejection at (5a)
\*   - AdjustCap ranges over 1..Cap = {1, 2}: shrink below and hold
\*     are reachable (the documented scenario is the operator's
\*     smaller-cap redeploy; growth past the initial cap is
\*     undocumented surface and only lengthens mempool sequences)
\*
\* MaxNonce=2 is the smallest value that keeps the per-sender quota
\* branch reachable: nonces {0, 1, 2} let one sender hold
\* MaxPerSender=2 pipelined txs AND submit a third at a fresh slot,
\* firing the "future_nonce" rejection at branch (4); ApplyBlock
\* still advances applied_nonces across multiple steps so
\* INV_NonceMonotonic + the stale-nonce gate are exercised.
\*
\* MaxFee=1 gives two fee tiers (0, 1) — the minimum that surfaces
\* both RBF tie-break directions (incumbent fee >= incoming rejects
\* as "duplicate" at (3a); incumbent 0 < incoming 1 replaces at
\* (3b)) plus the fee-priority eviction (incoming 1 > min 0 at (5b))
\* and the cap_full reject (incoming <= min at (5a)).
\*
\* Hashes={h1} is a singleton: the hash field is an inert identity
\* marker — no guard or invariant compares hashes (the C++ tx_store_
\* hash key collapses into the Seq position in this projection) —
\* so a second marker only multiplies the state space without new
\* behavior (the GovernanceParamChange inert-payload reduction).
\*
\* Domains={d1, d2} gives two senders, enough to exercise:
\*   - Per-sender quota at d1 while d2's slot remains open
\*     (INV_NoDuplicateAccountNonce is a per-(from, nonce) claim,
\*     so cross-sender interleaving is invariant-relevant)
\*   - Adversarial flood from d1 contained without affecting d2
\*
\* PROP_EventualAdmissionOrRejection is a state-level formula (the
\* spec header calls it a standing invariant over the two audit
\* collections), so it is declared under INVARIANTS — as a PROPERTY
\* TLC would check it only in the initial state.

CONSTANTS
    Domains   = {d1, d2}
    Hashes    = {h1}
    MaxNonce  = 2
    MaxFee    = 1
    Cap       = 2

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_MempoolBounded
    INV_NoStaleAdmission
    INV_NoDuplicateAccountNonce
    INV_RejectionLogCorrectness
    INV_SigValidityNecessary
    INV_NonceMonotonic
    PROP_EventualAdmissionOrRejection

PROPERTIES
    PROP_MempoolEventuallyDrains
