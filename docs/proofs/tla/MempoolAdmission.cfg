\* TLC configuration for MempoolAdmission.tla
\* Model: 2 domains, 4 hashes, MaxNonce=3, MaxFee=3, Cap=3.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes
\* while still exercising every action disjunct (AdmitTransaction's
\* seven branches + ApplyBlock + EvictStale + OverwriteSameAccount
\* SameNonce + AdjustCap + Stutter) with realistic interleavings of
\* fresh admit, RBF replace, stale-nonce sweep, cap-eviction, per-
\* sender quota hit, and adversarial bad-sig submissions.
\*
\* Cap=3 is the smallest value that lets the global-cap eviction
\* branch fire while still leaving room for fresh-admit traces:
\*   - Three legitimate admits saturate the cap
\*   - A fourth admit at higher fee than the min triggers the
\*     fee-priority eviction at AdmitTransaction (5b)
\*   - A fourth admit at lower fee triggers the "cap_full"
\*     rejection at AdmitTransaction (5a)
\*
\* MaxNonce=3 is enough for:
\*   - Per-sender nonce sequence {0, 1, 2, 3} ⇒ four pipelined txs
\*     per sender (more than MaxPerSender = Cardinality(Hashes)/2 + 1
\*     = 3, so the per-sender quota branch (4) is reachable)
\*   - ApplyBlock advancing applied_nonces across multiple steps
\*     so INV_NonceMonotonic + EvictStale's surface are both
\*     exercised
\*
\* MaxFee=3 gives four distinct fee tiers (0, 1, 2, 3) so the
\* RBF tie-break + fee-priority eviction tie-break can both
\* surface non-trivially. Fee=0 enables the duplicate-loses-tie-
\* break branch (3a) on RBF; fee=3 enables the duplicate-wins-
\* tie-break branch (3b).
\*
\* Hashes={h1, h2, h3, h4} gives 4 distinct tx-identity markers,
\* enough to exhaust:
\*   - Three slot positions saturating cap=3
\*   - A fourth hash for eviction-or-rejection scenarios
\*   - Two distinct fee tiers per slot for RBF tie-break coverage
\*
\* Domains={d1, d2} gives two senders, enough to exercise:
\*   - Per-sender quota at d1 while d2's slot remains open
\*     (INV_NoDuplicateAccountNonce is a per-(from, nonce) claim,
\*     so cross-sender interleaving is invariant-relevant)
\*   - Adversarial flood from d1 contained without affecting d2

CONSTANTS
    Domains   = {d1, d2}
    Hashes    = {h1, h2, h3, h4}
    MaxNonce  = 3
    MaxFee    = 3
    Cap       = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_MempoolBounded
    INV_NoStaleAdmission
    INV_NoDuplicateAccountNonce
    INV_RejectionLogCorrectness
    INV_SigValidityNecessary
    INV_NonceMonotonic

PROPERTIES
    PROP_EventualAdmissionOrRejection
    PROP_MempoolEventuallyDrains
