\* TLC configuration for RpcAdmissionOrdering.tla
\* Model: Peers = {"p1", "p2"}, Burst = 2, MaxArrivals = 4.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (Arrive / Process / Refill) with
\* realistic interleavings of inbound arrival, three-stage gating, and
\* token refill — including the adversarial flood case and the mixed-
\* validity case under rate-limit pressure.
\*
\* Peers = {"p1", "p2"} gives 2 distinct bucket keys:
\*   - p1 + p2 give a non-trivial per-IP-independence surface: draining
\*     p1's bucket (so p1's subsequent requests are RATE_LIMITED) must
\*     not affect p2's bucket level. The S-014 per-IP-independence
\*     contract (T-3 of S014RateLimiterSoundness.md) is reachably
\*     exercised at |Peers| = 2.
\*
\* Burst = 2 gives a small token-bucket capacity:
\*   - With Burst = 2, a peer can be admitted twice before its bucket
\*     empties. The third Process on the same peer (with no intervening
\*     Refill) takes the RATE_LIMITED branch — exercising T-2 (rate-
\*     limited never authed) + T-3 (rate-limited never parsed) within
\*     the bounded run.
\*   - Refill restores tokens (capped at 2), so the bucket-recovery
\*     surface is reachably exercised: a previously-rate-limited peer
\*     becomes admittable again after a Refill.
\*
\* MaxArrivals = 4 bounds queue + processed growth so TLC exhausts in
\* seconds. The bound exercises:
\*   - Init at all-full buckets (every peer at Burst, empty queue/log).
\*   - Arrive(p1, "VALID")  → queue grows to 1.
\*   - Arrive(p1, "FORGED") → queue grows to 2.
\*   - Process → p1 admitted (token 2→1), parsed + authed, hdr=VALID
\*     ⇒ DISPATCHED; processed grows to 1.
\*   - Process → p1 admitted (token 1→0), parsed + authed, hdr=FORGED
\*     ⇒ AUTH_FAILED; processed grows to 2.
\*   - Arrive(p1, "VALID") → queue grows to 1 (p1 bucket now empty).
\*   - Process → p1 NOT admitted (token 0), NOT parsed, NOT authed
\*     ⇒ RATE_LIMITED; processed grows to 3. INV_RateLimitedNeverAuthed
\*     + INV_RateLimitedNeverParsed witnessed here.
\*   - Refill(p1) → p1 bucket 0→1; a subsequent Arrive+Process on p1
\*     would DISPATCH/AUTH_FAILED again (bucket recovered).
\*   - At MaxArrivals = 4 the Stutter action pins the bounded state
\*     space once the queue drains; PROP_EventualDrain witnesses the
\*     forward-progress contract.

CONSTANTS
    Peers       = {"p1", "p2"}
    Burst       = 2
    MaxArrivals = 4

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_DispatchImpliesBothGates
    INV_RateLimitedNeverAuthed
    INV_RateLimitedNeverParsed
    INV_OutcomeTotality
    INV_NoTokenUnderflow

PROPERTIES
    PROP_EventualDrain
