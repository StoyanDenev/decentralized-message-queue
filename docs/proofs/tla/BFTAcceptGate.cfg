\* TLC configuration for BFTAcceptGate.tla
\* Model: Members = {n1, n2, n3, n4, n5, n6}, KFull = 6,
\*        AbortThreshold = 5, MaxAborts = 7.
\*
\* This config DELIBERATELY uses KFull = 6 so the two-level BFT
\* shrinkage is NON-DEGENERATE:
\*   k_bft = KBft(6)            = ceil(2*6/3) = 4
\*   Q     = RequiredSigs(BFT,4) = ceil(2*4/3) = 3
\* so a BFT block carries a 4-member committee that may have at most
\* one sentinel (unsigned) slot (k_bft - Q = 4 - 3 = 1). This is the
\* regime FB1 Consensus.tla explicitly OVER-APPROXIMATES (FB1 applies
\* only the first shrinkage, Keff = ceil(2K/3) = 4, and would require 4
\* sigs where the real protocol requires 3). BFTAcceptGate checks the
\* exact two-level arithmetic at full fidelity, so this is the
\* higher-coverage path:
\*   - INV_QuorumArithmeticSound rejects any BFT block with < 3 sigs.
\*   - INV_SentinelBudgetRespected pins the 1-sentinel budget.
\*   - INV_ModeSizePairing rejects any BFT block not sized exactly 4
\*     and any MD block not sized exactly 6.
\*
\* Members = {n1, ..., n6} gives exactly KFull members so the MD
\* committee draws the full set; the CandidateSizes universe
\* {KFull, k_bft} = {6, 4} plus the mis-sized {KFull+1} = {7} is
\* SKIPPED here because |Members| = 6 < 7, so the mis-sized rejection
\* path is exercised via the alternative KFull=3 cfg run (see below).
\* To exercise the mis-size path at this K, bump Members to 7 elements.
\*
\* AbortThreshold = 5 is a deliberate SCENARIO constant (not the genesis
\* default, which the S-045 fix lowered to bft_escalation_threshold = 1 —
\* src/node/node.cpp config loader / genesis.hpp). 5 is chosen here purely
\* to exercise the gate at MaxAborts = 7: a candidate carries an abort
\* count both BELOW (0..4) and AT/ABOVE (5..7) the threshold,
\* so INV_BftRequiresEscalation is exercised on BOTH sides of the gate:
\* a BFT block with aborts < 5 is REJECTED (escalation unjustified);
\* a BFT block with aborts >= 5 is admissible (G2 satisfied).
\*
\* State space is small (committee size <= 6, signer subsets <= 2^6,
\* proposer <= 6, aborts <= 7, MaxCandidates = 6); TLC exhausts in
\* seconds.
\*
\* A SECOND config run at KFull = 3 (k_bft = Q = 2, the degenerate
\* coincidence) exercises the K=3 cluster/tactical-profile path where
\* the two shrinkages collapse; that run also has |Members| = 4 > 3 so
\* CandidateSizes includes the mis-sized {4} value and the
\* G_SizePairing rejection path is reachable. To run it, set:
\*   Members = {n1, n2, n3, n4}  KFull = 3  AbortThreshold = 5  MaxAborts = 7

CONSTANTS
    Members        = {n1, n2, n3, n4, n5, n6}
    KFull          = 6
    AbortThreshold = 5
    MaxAborts      = 7

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_ModeSizePairing
    INV_QuorumArithmeticSound
    INV_BftRequiresEscalation
    INV_ProposerSignedWhenBft
    INV_SentinelBudgetRespected

\* PROPERTIES intentionally omitted: this config checks SAFETY only.
\* The liveness properties the module defines (PROP_EventualVerdict /
\* PROP_HonestBlockAccepted) are NOT enforceable under this spec's
\* fairness (only WF_vars(Adjudicate) — nothing compels SubmitCandidate),
\* so a stuttering / BFT-only behaviour would violate them. The accept-gate
\* contract is a safety property (a wrong-mode/under-quorum block is never
\* accepted), fully covered by the INVARIANTS above; liveness is out of
\* scope for this gate model. See proofs/Liveness.md for protocol liveness.
