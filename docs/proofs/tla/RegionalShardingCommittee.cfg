\* TLC configuration for RegionalShardingCommittee.tla
\* Model: Validators = 4 validators × 2 regions, K = 2, MaxBlock = 4.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (AdvanceBlock / RegisterValidator /
\* RegionPoolShrink / ForceMerge) with realistic interleavings of
\* per-block region rotation, validator pool evolution, and R7
\* under-quorum merge composition.
\*
\* Validators = [v \in {"v1", "v2", "v3", "v4"} |-> ...] gives 4
\* distinct validator domains spread across 2 regions:
\*   - r1: {v1, v2}
\*   - r2: {v3, v4}
\* With K = 2 this is the minimum to exercise:
\*   - Init seeds active_validators with both r1 validators (CHOOSE picks
\*     a deterministic K=2 subset from the r1 region's pool).
\*   - RegionPoolShrink can deregister v1 or v2, dropping r1 below K=2
\*     and forcing the under-quorum branch (ForceMerge enables).
\*   - ForceMerge admits r2 as the merged-from region (the only sibling
\*     with active validators), widening the effective pool to all 4
\*     validators.
\*   - RegisterValidator(v3, "r2") + RegisterValidator(v4, "r2") populate
\*     r2's pool so ForceMerge has refugees to admit.
\*
\* Regions = {"r1", "r2"} gives 2 distinct region tags:
\*   - r1 is the initial region (via Init's CHOOSE over Regions).
\*   - r2 gives a non-trivial rotation target AND a sibling merge target.
\*   - With Cardinality(Regions) >= 2, RotateRegion(r) has a distinct
\*     alternative; AdvanceBlock can rotate non-trivially.
\*
\* K = 2 is the smallest committee size that exercises the full
\* state-machine surface:
\*   - With 2 validators per region, a single RegionPoolShrink drops
\*     the region's pool from 2 to 1, forcing under-quorum (< K = 2).
\*   - With ForceMerge widening the pool to all 4, AdvanceBlock can
\*     resume drawing a K=2 committee.
\*   - INV_CommitteeSizeIsK with K=2 enforces the |committee| <= 2
\*     ceiling; PROP_UnderQuorumMerge witnesses the merge fires when
\*     the under-quorum condition PERSISTS and a sibling region has
\*     at least one validator.
\*
\* MaxBlock = 4 is enough for:
\*   - Init at block_height=0 (genesis region r1, K=2 committee).
\*   - AdvanceBlock → block_height=1 (rotate to r2, K=2 committee from
\*     r2 — but r2's initial pool is empty until RegisterValidator
\*     populates it).
\*   - RegisterValidator(v3, "r2") + RegisterValidator(v4, "r2") → r2's
\*     pool grows to 2.
\*   - AdvanceBlock → block_height=2 (rotate back to r1, K=2 committee
\*     from r1).
\*   - RegionPoolShrink → r1's pool drops to 1 → under-quorum.
\*   - AdvanceBlock at r1 is now disabled (|pool| < K with no merge);
\*     ForceMerge fires → merge_state[r1] = {r2} → effective pool is
\*     all 3 (the surviving r1 + 2 r2).
\*   - AdvanceBlock → block_height=3 (K=2 from effective pool of 3).
\*   - At MaxBlock=4 the Stutter action pins the bounded state space;
\*     PROP_EventualCommitteeRotation + PROP_UnderQuorumMerge
\*     witnesses the rotation + merge composition.

\* TLC's config grammar cannot parse function-valued expressions, so
\* Validators is bound via <- to ModelValidators defined in the .tla
\* (same pattern as MerklePathVerify.cfg's ProofsUniverse).
CONSTANT Validators <- ModelValidators

CONSTANTS
    Regions    = {"r1", "r2"}
    K          = 2
    MaxBlock   = 4

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_CommitteeFromActiveRegion
    INV_CommitteeSizeIsK
    INV_RegionFilterDeterministic
    INV_NoCrossRegionLeak

PROPERTIES
    PROP_EventualCommitteeRotation
    PROP_UnderQuorumMerge
