\* TLC configuration for SubscriberBackpressure.tla (FB71).
\* Model: QUEUE_MAX = 2 (per-subscriber frame ceiling; production is the
\* clamped min(request, SUBSCRIBER_QUEUE_MAX=1024) with floor 4 — 2 keeps
\* the exhibit small while every overflow shape stays reachable),
\* MAX_BLOCKS = 5 (applied-block bound; >= QUEUE_MAX+2 so the stuck-writer
\* overflow — wip + full queue + one more frame — is reachable, with slack
\* for heartbeat interleavings), HEARTBEAT_BLOCKS = 2 (production default
\* 50, clamp [1,10000]; 2 makes heartbeat frames and the heartbeat-as-
\* overflow-trigger reachable inside 5 blocks).
\*
\* The interleaving of {per-block hook (match / no-match), writer thread
\* (wake / deliver / stall / broken-write / kill-exit), adversarial client
\* (stall / resume)} reaches every protocol shape:
\*   * overflow-kill with the writer PARKED (hook filled the queue before
\*     the writer ever ran) -> best-effort final error frame, both the
\*     delivered and the failed outcome;
\*   * overflow-kill with the writer WRITING and with it STUCK (client
\*     stalled mid-write) -> socket closed under the in-flight write,
\*     write fails frame-undelivered, writer exits DEAD;
\*   * heartbeat frames sharing the eid/seq space with dapp_call frames,
\*     including a heartbeat as the overflow trigger;
\*   * full drain (every generated frame delivered, seq 0..k contiguous).
\*
\* Measured (tla2tools v1.8.0, java 11): 880 distinct states, depth 18,
\* fingerprint graph exhausted in ~3s + liveness — well under the harness
\* 240s / ~2M-state budget. The five INVARIANTS hold at every reachable
\* state; the three PROPERTIES are checked under the Spec fairness (WF on
\* writer steps, SF on Deliver, WF on ClientResume — liveness-only
\* assumptions; safety is fairness-independent). The harness passes
\* -deadlock (deadlock-as-error OFF): DEAD and chain-idle terminal states
\* are benign exhibits.
\*
\* Probe_KilledStuckUnreachable / Probe_ErrorFrameUnreachable are
\* deliberately NOT listed: they are the M0a/M0b reachability probes
\* (EXPECTED FALSIFIED — see the spec header's dated probe table; listing
\* them here would turn the green gate red).

CONSTANTS
    QUEUE_MAX        = 2
    MAX_BLOCKS       = 5
    HEARTBEAT_BLOCKS = 2

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_BoundedQueue
    INV_NoSilentGap
    INV_KillOnOverflow
    INV_KilledFailClosed

PROPERTIES
    PROP_KilledEventuallyDead
    PROP_PendingDeliveredOrKilled
    PROP_StuckWriteBroken
