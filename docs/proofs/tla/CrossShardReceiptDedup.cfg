\* TLC configuration for CrossShardReceiptDedup.tla
\* Model: 3 shards, 2 domains, 2 tx-hashes, MaxAmount=3, MaxHeight=4.
\*
\* This is small enough for TLC to exhaust in seconds-to-minutes while
\* still exercising every action disjunct (SubmitReceipt /
\* ApplyFirst / ApplyDuplicate / Snapshot / Restore / Equivocate)
\* with realistic interleavings of legitimate and adversarial paths.
\*
\* Shards={s1, s2, s3} gives a non-singleton shard set so the
\* Inv_DedupKeyIsPair invariant is non-trivial: TLC explores traces
\* where the same tx_hash appears in two different src_shards
\* simultaneously (e.g., (s1, h1) and (s2, h1)), and verifies both
\* keys appear in applied_receipts as distinct entries — exactly
\* what the T-R3 claim requires.
\*
\* Domains={a, b} gives two recipients so the per-domain
\* Inv_NoDoubleCredit invariant is non-trivial: TLC explores traces
\* where receipts target different recipients in interleaved order
\* and confirms each balance reflects only the unique-key amounts
\* targeting it.
\*
\* Hashes={h1, h2} with 3 shards gives 6 possible dedup keys:
\*   (s1, h1), (s1, h2), (s2, h1), (s2, h2), (s3, h1), (s3, h2)
\* The model can reach all 6 entries in applied_receipts within
\* MaxHeight=4 apply steps (the per-step bound on pending_receipts
\* length is MaxHeight + 1 = 5, but multiple SubmitReceipt steps
\* can build up the queue before ApplyFirst drains it).
\*
\* MaxAmount=3 lets per-receipt amounts range over {0, 1, 2, 3}.
\* The Inv_BalanceNonNegative invariant is structurally trivial
\* (every action either preserves balance or credits Nat-typed
\* amounts), but TLC explores the full balance range and confirms
\* the no-overflow contract at the apply layer. The
\* MaxAmount * Cardinality(applied_receipts) upper bound in
\* Inv_NoDoubleCredit is tight for the case where every applied
\* receipt has amount = MaxAmount targeting the same recipient.
\*
\* MaxHeight=4 is enough for:
\*   - SubmitReceipt + ApplyFirst cycles: queue up 1-2 receipts,
\*     drain them with fresh keys, queue up more
\*   - Equivocate scenarios: submit r1 with key (s1, h1), apply
\*     ApplyFirst(r1), submit r2 with key (s1, h1), then either
\*     ApplyDuplicate(r2) silent-skips OR the dedup gate at
\*     ApplyFirst's pre-condition rejects r2 — both branches are
\*     witnessed
\*   - Snapshot + Restore round-trips: apply some receipts, snapshot,
\*     apply more receipts (advancing applied_receipts and
\*     accumulated_inbound), restore, verify the post-restore state
\*     matches the snapshot triple (S-037 T-R4 dedup-set survival)
\*   - Multi-shard same-tx_hash traces: SubmitReceipt({s1, h1, a, 1}),
\*     SubmitReceipt({s2, h1, a, 1}), ApplyFirst both — recipient a's
\*     balance bumps to 2 (one credit per unique src_shard, NOT one
\*     credit total despite shared tx_hash), witnessing T-R3
\*
\* The fairness on ApplyFirst drives Prop_EventualApply: any fresh-key
\* receipt at the head of pending_receipts eventually drains. Without
\* this fairness a trace could indefinitely stutter once the queue
\* is non-empty.
\*
\* Adversarial-scenario coverage:
\*   - Pure replay (ApplyDuplicate path): submit r, ApplyFirst(r),
\*     submit r again (via Equivocate or SubmitReceipt), ApplyDuplicate(r)
\*     silent-skips. Inv_NoDoubleCredit: recipient credited exactly once.
\*   - Snapshot-then-replay: submit r, ApplyFirst(r), Snapshot,
\*     submit r again (Equivocate), ApplyDuplicate(r) silent-skips.
\*     Inv_AccumulatedInboundMonotonic: counter not double-bumped.
\*   - Restore-then-replay: ApplyFirst(r), Snapshot, Restore (which
\*     replays applied_receipts \cup {KeyOf(r)} verbatim), submit r
\*     again, ApplyDuplicate(r) silent-skips. T-R4 is structurally
\*     preserved: the dedup set survives restore.
\*   - Snapshot-before-apply: Snapshot (with empty applied_receipts),
\*     submit r, ApplyFirst(r), Restore (which rewinds applied_receipts
\*     to empty), submit r again, ApplyFirst(r) again — credits a
\*     second time. This is NOT a bug: it models the legitimate case
\*     of restoring from an older snapshot and replaying history.
\*     The model is consistent; the dedup invariants hold relative to
\*     the current applied_receipts state, not historical credits.
\*
\* Multi-entry pending queues are reachable from this configuration:
\* e.g., SubmitReceipt({s1, h1, a, 1}), SubmitReceipt({s1, h2, a, 1}),
\* SubmitReceipt({s2, h1, a, 1}), then ApplyFirst three times in
\* head-first order drains the queue and applies all three credits
\* with distinct keys. Inv_AppliedImpliesCredited then witnesses
\* every applied key has a matching history entry.

CONSTANTS
    Shards    = {s1, s2, s3}
    Domains   = {a, b}
    Hashes    = {h1, h2}
    MaxAmount = 3
    MaxHeight = 4

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_BalanceNonNegative
    Inv_AccumulatedInboundMonotonic
    Inv_DedupKeyIsPair
    Inv_NoDoubleCredit
    Inv_AppliedImpliesCredited

PROPERTIES
    Prop_DedupAlwaysHolds
    Prop_EventualApply
