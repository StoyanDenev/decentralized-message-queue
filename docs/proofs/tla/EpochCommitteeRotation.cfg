\* TLC configuration for EpochCommitteeRotation.tla
\* Model: ValidatorPool = {v1, v2, v3, v4, v5}, K = 3, MaxEpoch = 4,
\* BeaconValues = {b1, b2, b3}.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (AdvanceEpoch / RegisterValidator /
\* DeregisterValidator / BeaconUpdate) with realistic interleavings
\* of cross-epoch committee rotation, active-set evolution, and
\* beacon-randomness updates.
\*
\* ValidatorPool = {v1, v2, v3, v4, v5} gives 5 distinct validator
\* domains. Five is the minimum to exercise the rotation surface
\* non-trivially:
\*   - Init seeds active_validators with a K=3 subset (CHOOSE picks
\*     a deterministic 3-element subset under TLA enumeration order).
\*   - DeregisterValidator(v) can shrink the active set from 5 to 4
\*     or 4 to 3 without triggering the `Cardinality > 1`
\*     under-quorum guard.
\*   - RegisterValidator(v) can grow the active set from K=3 (the
\*     initial size) back up to ValidatorPool=5 across multiple
\*     fires.
\*   - With |active_validators| >= K + 1 = 4, multiple distinct
\*     K-subsets exist within the pool — INV_DeterministicSelection
\*     plus PROP_EventualRotation become non-trivially exercised
\*     (rotation is structurally possible AND observable).
\*
\* K = 3 matches the cluster + tactical + single_test production
\* profiles' block_sig_committee_size at
\* `include/determ/chain/params.hpp`. It's the smallest K that
\* makes the (Q, k_bft) trio non-degenerate at the within-epoch
\* BFT escalation layer (FB1 territory); for the across-epoch
\* rotation surface that this spec covers, K=3 keeps the
\* SUBSET-of-cardinality-3 universe small (C(5, 3) = 10
\* committees) while exercising the full Fisher-Yates branch
\* of select_m_creators (K << N branch fires at K * 2 <= N, so
\* K=3, N=5 satisfies 6 <= 5 = FALSE → partial-FY branch fires;
\* this is the higher-coverage path of the hybrid switch).
\*
\* MaxEpoch = 4 is enough for:
\*   - Init at epoch=0 → AdvanceEpoch → epoch=1 → BeaconUpdate(b2)
\*     → AdvanceEpoch → epoch=2 (consecutive distinct beacons;
\*     INV_DeterministicSelection's contrapositive exercised when
\*     beacon changes)
\*   - Same-beacon-different-pool branch: AdvanceEpoch at
\*     beacon=b1 → DeregisterValidator(v1) → BeaconUpdate(b1) →
\*     AdvanceEpoch → epoch=2 (same beacon, smaller pool, rotation
\*     forced by pool change — exercises INV_DeterministicSelection's
\*     non-applicability when selected_from differs)
\*   - At MaxEpoch=4, the Stutter action pins the bounded state
\*     space; PROP_EventualRotation's bounded form witnesses
\*     rotation within the [0..4] schedule.
\*
\* BeaconValues = {b1, b2, b3} gives 3 distinct beacon hashes:
\*   - b1 is the initial beacon (via Init's CHOOSE).
\*   - b2, b3 give two distinct alternatives so BeaconUpdate has
\*     non-trivial choice; the >=2 condition of ConfigOK is satisfied
\*     with margin.
\*   - Three beacons exercise the "same beacon across two epochs →
\*     potentially same committee" (T-ER1 determinism witness via
\*     INV_DeterministicSelection) AND the "distinct beacons →
\*     potentially distinct committees" (T-ER5 rotation witness via
\*     PROP_EventualRotation) interleavings.

CONSTANTS
    ValidatorPool      = {v1, v2, v3, v4, v5}
    K                  = 3
    MaxEpoch           = 4
    BeaconValues       = {b1, b2, b3}

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_CommitteeSizeIsK
    INV_CommitteeSubsetActive
    INV_DeterministicSelection
    INV_HistoryMonotone

PROPERTIES
    PROP_EventualRotation
    PROP_NoCommitteeFreeze
