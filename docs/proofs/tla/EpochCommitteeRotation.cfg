\* TLC configuration for EpochCommitteeRotation.tla (redesigned 2026-07-02).
\* Model: ValidatorPool = {1, 2, 3, 4, 5}, K = 3, MaxEpoch = 4, MaxBeacon = 3.
\*
\* Validator ids and beacons are NATURALS (not model values): the
\* redesigned selector ranks k-subsets by their binary-encoding order
\* and indexes the ranking with (beacon % #subsets), so both need
\* arithmetic. Beacon naturals are the injective beacon->index map;
\* see the module header for why MaxBeacon <= K + 1 makes distinct
\* beacons always select distinct committees at a fixed pool.
\*
\* ValidatorPool = {1..5}, K = 3: reachable pools have 4 or 5 members
\* (the >= K+1 modeled regime — Init at 4, Register up to 5,
\* Deregister only from 5), giving C(4,3) = 4 or C(5,3) = 10 candidate
\* committees per draw — several distinct committees are reachable, so
\* rotation, determinism, and subset-of-active are all exercised
\* non-trivially. K = 3 matches the cluster / tactical / single_test
\* profiles' block_sig_committee_size (include/determ/chain/params.hpp).
\*
\* MaxEpoch = 4: five recorded draws (epochs 0..4) — enough for
\*   - a beacon-forced rotation pair at a fixed pool (epochs 0->1),
\*   - pool-mutation interleavings between draws (Register/Deregister
\*     are unfair, so TLC explores draws at every reachable pool),
\*   - a repeated (pool, beacon) pair at non-adjacent epochs (the
\*     beacon cycles 1->2->3->1, so e.g. epochs 0 and 3 can share
\*     beacon 1 with the pool restored — INV_DeterministicSelection's
\*     antecedent is reachable, not vacuous).
\*
\* MaxBeacon = 3 (>= 2 so the AdvanceEpoch freshness guard always has
\* an alternative value; <= K+1 = 4 for the injective-index regime).
\*
\* Expected: all five invariants + PROP_EventualRotation green.
\* PROP_EventualRotation is the quiet-pool conditional form
\* ([](pool constant) => <>rotation); the unconditional form is
\* deliberately NOT asserted — with adversarial pool churn the
\* committee can be held constant (and production's churn-rotation
\* is only probabilistic). PROP_NoCommitteeFreeze (pre-redesign) was
\* deleted; its honest content lives in ASSUME BeaconSensitivity
\* (checked by TLC at startup) + PROP_EventualRotation. See the
\* module header for the full rationale.

CONSTANTS
    ValidatorPool = {1, 2, 3, 4, 5}
    K             = 3
    MaxEpoch      = 4
    MaxBeacon     = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_CommitteeSizeIsK
    INV_CommitteeSubsetActive
    INV_DeterministicSelection
    INV_HistoryMonotone

PROPERTIES
    PROP_EventualRotation
