\* TLC configuration for StakeRefundFlow.tla (FB41)
\* Model: 2 domains {d1, d2}, MaxAmount=3, UNSTAKE_DELAY=2, MaxHeight=5,
\* NONE=1000.
\*
\* The 2-domain Cardinality is sufficient for every refund-timing
\* invariant (the per-domain INV_A1Conservation is observable on
\* a single domain; the second domain is included for the cross-
\* domain "refund one, don't touch the other" coverage and to
\* exercise the per-domain independence invariant).
\*
\* MaxAmount=3 + UNSTAKE_DELAY=2 + MaxHeight=5 gives the model
\* windows like:
\*   t=0: Stake(d1, 3)         → balance 0, locked 3
\*   t=1: Deregister(d1)       → DEREGISTERED; unlock_height = 1+2 = 3
\*   t=2: AdvanceHeight to 2    → pre-unlock window; UnstakeEarly stutter
\*   t=2: UnstakeEarly(d1)     → INV_NoEarlyRefund verified
\*   t=3: AdvanceHeight to 3    → unlock window open
\*   t=3: UnstakePost(d1)       → refund full 3 to balance; unlock_height NONE
\*   t=3: DeregisterIdempotent  → on d2 (already DEREGISTERED): stutter
\*                                INV_DeregisterIdempotent verified
\*
\* PROP_EventualRefund + PROP_NoStuckStake are checked under WF on
\* AdvanceHeight + UnstakePost. The MaxHeight=5 escape clause covers
\* the case where the unlock_height arming would push beyond the
\* model bound (e.g., Deregister at height 4 → unlock_height = 6
\* > MaxHeight; the temporal property's bounded-model escape fires).
\*
\* NONE=1000 is far larger than MaxHeight + UNSTAKE_DELAY + 1 = 8,
\* satisfying ConfigOK; the clear-to-NONE transition on UnstakePost
\* remains semantically valid as the "no unlock armed" sentinel.
\*
\* Coverage matrix:
\*   - Stake(d, amt): balance >= amt branch + balance < amt rejection
\*   - Deregister(d): ACTIVE → DEREGISTERED arming
\*   - DeregisterIdempotent(d): second-DEREGISTER stutter
\*   - UnstakeEarly(d): three early-skip routes
\*       (a) not DEREGISTERED, (b) no armed unlock, (c) pre-unlock window
\*   - UnstakePost(d): post-unlock refund
\*   - AdvanceHeight: temporal driver to unlock window
\*
\* INV_A1Conservation tracks the per-domain supply identity:
\*   balance[d] + stake_locked[d] = MaxAmount = 3 at every reachable
\*   state for every d. The total supply 2*3 = 6 is preserved.
\*
\* Expected state-space magnitude: ~10⁴ states; < 30s wall-clock on
\* a single TLC core. The bounded MaxHeight=5 ceiling caps the
\* temporal interleaving search; the per-action-disjunct enumeration
\* gives ~5-6× per height-step branching factor.

CONSTANTS
    Domains       = {d1, d2}
    MaxAmount     = 3
    UNSTAKE_DELAY = 2
    MaxHeight     = 5
    NONE          = 1000

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_StakeNonNegative
    INV_A1Conservation

PROPERTIES
    INV_DeregisterSchedules
    INV_NoEarlyRefund
    INV_PostUnlockRefund
    INV_UnlockHeightMonotonic
    INV_DeregisterIdempotent
    PROP_EventualRefund
    PROP_NoStuckStake
