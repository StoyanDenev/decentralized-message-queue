\* TLC configuration for UnstakeEligibilityRead.tla (FB53).
\* Model: 2 domains, locked amounts {0, 1}, concrete unlock heights {1, 2},
\* a NONE sentinel (3) > MaxHead+1, MaxHead=1, MaxReads=5. A small finite
\* universe that still exercises every disjunct of the four-gate trustless-
\* read pipeline (anchor / head / path / bind) AND every height-relative
\* verdict (NO-STAKE / BONDED / ELIGIBLE / LOCKED / UNVERIFIABLE) with
\* realistic interleavings of Read actions against the fixed committed
\* s:-namespace stake table.
\*
\* SHA-256 / the canonical StakeEntry encoding is the injective-term
\* abstraction inside the .tla (Encode(e) = <<"stake_leaf", e>>); the .cfg
\* supplies only the FINITE domain x locked x unlock-height universe over
\* which StakeEntry + DaemonFlags range. The bind gate (T-UE5) reduces to
\* claimed = committed under that abstraction, so the daemon-flag universe
\* TLC enumerates includes BOTH a faithful claim (equal to the committed
\* leaf -> bind passes) AND forged claims (a different locked / unlock_height
\* -> bind fails). A forged claim that swaps a MATURED unlock_height for the
\* committed one is precisely the false-ELIGIBLE attack INV_NoFalseEligible
\* rules out.
\*
\* The four gates each have an honest + a forged variant in the enumerated
\* DaemonFlags universe:
\*   anchor_honest : TRUE | FALSE  — daemon ran our chain, or did not.
\*   head_honest   : TRUE | FALSE  — committee-signed head (state_root + head
\*                                   height H genuine), or forged.
\*   path_honest   : TRUE | FALSE  — honest s:<domain> Merkle path, or forged.
\*   claimed       : ranges over StakeEntry — a faithful claim binds; a forged
\*                   claim (locked or unlock_height differs) fails the bind.
\* TLC's \E daemon \in DaemonFlags in the Read action enumerates the full
\* cross product, so every single-gate-forged variant (anchor-forged,
\* head-forged, path-forged, bind-forged) is reachable, plus the all-honest +
\* faithful-claim sound-verdict case.
\*
\* committed — the fixed s:-namespace leaf domain at this state-root. Because
\* Init quantifies committed over [Domains -> CommittedShape], TLC explores
\* ALL legal committed mappings, including:
\*   * d1 committed, d2 absent  — so an absent-domain read (d2) is reachable;
\*     INV_NoEligibleOnAbsent confirms it never reports ELIGIBLE (no committed
\*     leaf -> path AND bind both fail -> UNVERIFIABLE; the classifier's
\*     absent branch is NO-STAKE).
\*   * locked = 0 leaf          — so the NO-STAKE verdict is reachable.
\*   * unlock_height = NONE      — so the BONDED verdict is reachable.
\*   * unlock_height in {1, 2}   — so BOTH ELIGIBLE (H+1 >= unlock) and LOCKED
\*     (H+1 < unlock) are reachable across the head range.
\* The full [Domains -> CommittedShape] enumeration is bounded by the small
\* Domains x CommittedShape universe and stays tractable.
\*
\* head — Init quantifies head over 0..MaxHead = {0, 1}. With unlock heights
\* {1, 2} and the next-block offset H+1:
\*   * head=0 (H+1=1): unlock_height=1 -> ELIGIBLE; unlock_height=2 -> LOCKED.
\*   * head=1 (H+1=2): unlock_height=1 -> ELIGIBLE; unlock_height=2 -> ELIGIBLE.
\* so both the ELIGIBLE and LOCKED branches (and the +1 next-block boundary)
\* are exercised. NONE=3 > MaxHead+1=2, so an unlock_height=NONE NEVER matures
\* (the BONDED verdict) — exactly the apply-side "DEREGISTER must arm an
\* unlock first" rule.
\*
\* MaxReads=5 is enough to reach every outcome class within a single trace:
\*   1. Read(d1, anchor-forged)         -> UNVERIFIABLE (T-UE2 / INV_AnchorGate)
\*   2. Read(d1, head-forged)           -> UNVERIFIABLE (T-UE3 / INV_HeadGate)
\*   3. Read(d1, path-forged)           -> UNVERIFIABLE (T-UE4 / INV_PathGate)
\*   4. Read(d1, bind-forged claim)     -> UNVERIFIABLE (T-UE5 / INV_BindGate)
\*   5. Read(d1, all-honest + faithful) -> sound verdict (T-UE1 / T-UE6 /
\*                                          T-UE7: ELIGIBLE / LOCKED / BONDED /
\*                                          NO-STAKE per committed leaf + head)
\* plus a Read against an absent domain -> NO-STAKE / UNVERIFIABLE, never
\* ELIGIBLE (INV_NoEligibleOnAbsent). TLC explores all reachable interleavings
\* of these (and every other (domain, daemon) combination) within the
\* MaxReads bound; the eight invariants hold at every reachable state.
\*
\* INV_NoFalseEligible (T-UE6) is the non-trivial crux under this config: a
\* daemon serving a forged claim with a matured unlock_height (e.g. claiming
\* unlock_height=1 while the committed leaf has unlock_height=2) yields a
\* DIFFERENT canonical encoding (Encode injective), so the bind gate rejects
\* it -> UNVERIFIABLE, NOT a false ELIGIBLE. TLC verifies that NO read reports
\* ELIGIBLE unless the COMMITTED unlock_height has genuinely matured at H+1 —
\* the s:-namespace no-false-ELIGIBLE guarantee, the trustless dual of the
\* S-017 / FB8 apply-side no-early-unstake invariant.

CONSTANTS
    Domains  = {d1, d2}
    Lockeds  = {0, 1}
    Unlocks  = {1, 2}
    NONE     = 3
    MaxHead  = 1
    MaxReads = 5

SPECIFICATION Spec

INVARIANTS
    INV_TypeOK
    INV_FourGateSound
    INV_AnchorGate
    INV_HeadGate
    INV_PathGate
    INV_BindGate
    INV_NoFalseEligible
    INV_VerdictFaithful
    INV_NoEligibleOnAbsent
    \* PROP_Determinism is a state predicate (holds at every reachable
    \* state), so TLC checks it as an invariant.
    PROP_Determinism

PROPERTIES
    PROP_EventualAnswer
