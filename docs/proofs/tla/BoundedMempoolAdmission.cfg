\* TLC configuration for BoundedMempoolAdmission.tla (FB38).
\* Model: Senders = {"a", "b"}, Nonces = {0, 1, 2}, Fees = {1, 2, 3},
\*        Cap = 3, MaxOps = 4.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (Submit's three sub-cases: room-
\* available admit / cap-pressure evict-then-admit / cap-pressure
\* reject; RBF's strict-greater replacement; Apply's nonce-gate
\* advance; EvictLowest's standalone eviction) with realistic
\* interleavings of fresh admit, cap-pressure eviction, RBF replace,
\* and apply-driven mempool drain.
\*
\* Cap = 3 is the smallest value that lets the cap-pressure branch
\* fire while still leaving room for fresh-admit traces:
\*   - Three legitimate admits (across the two senders) saturate
\*     the cap.
\*   - A fourth admit at higher fee than the min triggers the
\*     fee-priority eviction (Submit's (c) branch + EvictLowest).
\*   - A fourth admit at lower fee triggers the silent reject
\*     (Submit's (d) branch).
\*
\* Nonces = {0, 1, 2} gives three nonce values per sender — enough
\* to exercise:
\*   - Three pipelined-nonce admits per sender (nonces 0, 1, 2).
\*   - Apply advancing next_nonce[sender] across multiple steps
\*     so INV_NonceGated + PROP_NoStaleNonceEverAdmitted are both
\*     exercised non-trivially.
\*
\* Fees = {1, 2, 3} gives three distinct fee tiers — enough to
\* exercise:
\*   - The RBF strict-greater discipline (fee=1 -> fee=2; fee=2
\*     -> fee=3; tie-on-equal rejects).
\*   - The cap-eviction fee-priority discipline (incoming fee=3
\*     evicts incumbent fee=1; incoming fee=1 rejected against
\*     incumbent fee=2 min).
\*
\* Senders = {"a", "b"} gives two senders — enough to exercise:
\*   - Per-sender nonce-frontier independence (Apply on "a"
\*     advances next_nonce["a"] without affecting next_nonce["b"]).
\*   - Cross-sender cap-eviction (a tx from "a" can evict a tx
\*     from "b" if "a"'s fee is higher).
\*   - RBF same-sender same-nonce uniqueness (INV_RBFFeeMonotone
\*     covers the per-(sender, nonce) slot discipline).
\*
\* MaxOps = 4 bounds the total Submit + RBF + EvictLowest actions
\* so TLC exhausts (Apply is budget-exempt — it only drains, and
\* PROP_EventualApplyOrEvict's fairness needs it enabled after the
\* budget is spent; gap-nonce txs' eventual exit stays cap-
\* pressure-conditional by design). The bound exercises:
\*   - Submit-then-Submit-then-Submit (cap saturation at three).
\*   - Submit-then-Submit-then-Submit-then-Submit (cap pressure
\*     fires either evict-then-admit or silent reject).
\*   - Submit-then-Submit-then-Apply-then-Submit (apply drains
\*     one slot, fresh-admit fills it).
\*   - Submit-then-RBF-then-Apply-then-Apply (RBF replaces at
\*     same slot, subsequent applies drain in order).
\*   - Submit-then-Submit-then-Submit-then-EvictLowest (standalone
\*     eviction without an associated incoming admit).

CONSTANTS
    Senders  = {"a", "b"}
    Nonces   = {0, 1, 2}
    Fees     = {1, 2, 3}
    Cap      = 3
    MaxOps   = 4

SPECIFICATION Spec

INVARIANTS
    TypeOK
    INV_CapBound
    INV_NonceGated
    INV_RBFFeeMonotone
    INV_EvictionAlwaysLowest

PROPERTIES
    PROP_EventualApplyOrEvict
    PROP_NoStaleNonceEverAdmitted
