\* TLC configuration for StakeLifecycle.tla
\* Model: 3 domains, MaxHeight=6, MaxBalance=5, UnstakeDelay=3,
\* Sentinel=1000.
\*
\* This is small enough for TLC to exhaust in seconds while still
\* exercising every action disjunct (Stake / Deregister / Unstake /
\* UnstakeFailEarly / AdvanceHeight) with realistic interleavings.
\*
\* Sentinel=1000 is far larger than MaxHeight + UnstakeDelay + 1 = 10,
\* so the ConfigOK assumption (`Sentinel > MaxHeight + UnstakeDelay + 1`)
\* is satisfied and the clear-to-Sentinel transition (on Unstake) is
\* monotone non-decreasing.
\*
\* The MaxHeight=6 / UnstakeDelay=3 sizing ensures that after a
\* Deregister at height=h (which arms unlock_height = h + 1 + 3),
\* the unlock window is reachable for any h <= 2 (unlock_height
\* in [4, 6]). Heights h >= 3 leave the unlock_height beyond MaxHeight,
\* exercising the "unlock_height > MaxHeight" escape in
\* Prop_EventualUnstake. Both branches are explored.
\*
\* Submit-stake-then-deregister-then-fail-early-then-tick-to-unlock-
\* then-unstake, deregister-without-stake, multi-account interleaving,
\* and pre-unlock fail-early are all reachable from this configuration.

CONSTANTS
    Domains      = {a, b, c}
    MaxHeight    = 6
    MaxBalance   = 5
    UnstakeDelay = 3
    Sentinel     = 1000

SPECIFICATION Spec

INVARIANTS
    Inv_TypeOK
    Inv_StakeNonNegative
    Inv_BalanceNonNegative
    Inv_A1Conservation
    Inv_DeregisterImpliesActiveOff

PROPERTIES
    Inv_UnlockMonotonic
    Inv_NoEarlyUnstake
    Inv_StakeChangeOnlyViaStakeOrUnstake
    Prop_EventualUnstake
    Prop_StakeOrUnstakeOnly
