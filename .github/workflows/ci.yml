# Determ CI — the push-triggered form of tools/ci_local.sh (same content):
# build all three binaries + run the FAST=1 suite + the offline doc-coherence
# guards, on a clean Linux runner and a clean Windows/MSVC runner.
#
# INERT until this file reaches a GitHub remote with Actions enabled — it was
# committed as part of the 1a second-platform-gate decision (2026-07-03); the
# local WSL2 run via tools/ci_local.sh is the primary gate on the dev box.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install python cryptography (vector-gate oracle)
        run: python3 -m pip install --user cryptography argon2-cffi pynacl
      - name: Build + FAST + guards
        run: bash tools/ci_local.sh --jobs 4

  windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install python cryptography (vector-gate oracle)
        run: python -m pip install cryptography argon2-cffi pynacl
      - name: Build + FAST + guards
        shell: bash
        run: bash tools/ci_local.sh --jobs 4

  # UBSan pass over the consensus surface — the undefined-behavior net for
  # the state_root-fork class (2026-07-03). UBSan is scoped to Determ's own
  # targets (-DDETERM_UBSAN=ON), so the vendored deps are not instrumented.
  # Separate job: Linux/GCC-only.
  ubsan:
    runs-on: ubuntu-latest
    # The UBSan pass compiles the ~14k-line main.cpp at RelWithDebInfo with
    # -fsanitize=undefined AND builds the vendored OpenSSL from source on a clean
    # runner; the first Actions run hit the 90-min wall (SIGTERM/143) before the
    # build finished. Give it headroom (the dev-box WSL2 run is the fast gate).
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - name: Install python cryptography (vector-gate oracle)
        run: python3 -m pip install --user cryptography argon2-cffi pynacl
      - name: UBSan build + run consensus subcommands
        run: bash tools/ci_local.sh --sanitize --jobs 4
